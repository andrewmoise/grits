<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gimbal</title>
<link rel="stylesheet" href="./lib/style/style.css">
<style>
  /* ═══════════════════════════════════════════════════
     BASE
     ═══════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root { --pad: 0.5rem; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg-root);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 2rem 2rem;
    pointer-events: none; z-index: 0;
  }

  ::-webkit-scrollbar { width: 0.25rem; height: 0.25rem; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 0.125rem; }
  * { scrollbar-width: thin; scrollbar-color: var(--border-hi) transparent; }
  #minimized-section { scrollbar-width: none; }
  #minimized-section::-webkit-scrollbar { display: none; }

  /* ═══════════════════════════════════════════════════
     ROOT LAYOUT
     ═══════════════════════════════════════════════════ */
  #root { display: flex; width: 100%; height: 100%; position: relative; z-index: 1; }

  #workspace {
    flex: 1 1 0;
    position: relative;
    min-width: 0;
  }

  /* ═══════════════════════════════════════════════════
     WIDGETS
     ═══════════════════════════════════════════════════ */
  .widget {
    position: absolute;
    display: flex; flex-direction: column;
    background: var(--bg-float);
    border: 1px solid var(--border);
    border-radius: var(--widget-r);
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 0.4rem 1.5rem rgba(0,0,0,0.45),
      0 0.1rem 0.3rem rgba(0,0,0,0.3);
    transition:
      left   var(--dur) var(--ease-sine),
      top    var(--dur) var(--ease-sine),
      width  var(--dur) var(--ease-sine),
      height var(--dur) var(--ease-sine),
      opacity var(--dur) var(--ease-sine),
      border-color 0.25s;
  }
  .widget:focus-within {
    border-color: var(--border-focus);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 0.6rem 1.75rem rgba(0,0,0,0.55),
      0 0.1rem 0.3rem rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .widget-icon {
    width: var(--btn-size); height: var(--btn-size);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); flex-shrink: 0;
    margin-right: 0.1rem;
  }
  .widget-icon svg { width: var(--btn-svg-sz); height: var(--btn-svg-sz); stroke-width: 1.7; }
  .widget:focus-within .widget-icon { color: var(--text); }

  /* clickable main icon */
  .widget-icon.is-action {
    cursor: pointer;
    border-radius: 0.3rem;
    padding: 0.1rem;
    transition: background 0.12s, color 0.12s;
  }
  .widget-icon.is-action:hover { background: var(--bg-hover); color: var(--text-hi); }

  #workspace-empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.5rem; color: var(--text-dim);
    font-size: var(--fs-base); font-family: var(--font-ui); opacity: 0.4;
    pointer-events: none;
  }
  #workspace-empty svg { width: 1.25rem; height: 1.25rem; }

  /* ═══════════════════════════════════════════════════
     WIDGET TITLE
     ═══════════════════════════════════════════════════ */
  .widget-title {
    height: var(--title-h);
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 0.3rem;
    flex-shrink: 0; cursor: grab;
    border-radius: var(--widget-r) var(--widget-r) 0 0;
    transition: background 0.15s; overflow: visible;
  }
  .widget:focus-within .widget-title { background: var(--bg-active); }
  .widget-title:active { cursor: grabbing; }

  /* dirty state — title text shifts to accent green */
  .widget-title.is-dirty .widget-name { color: var(--a2, #4ade80) !important; }

  .title-left  { display: flex; align-items: center; gap: 0; flex-shrink: 0; }
  .title-right { display: flex; align-items: center; justify-content: flex-end; gap: 0.1rem; flex-shrink: 0; }

  .widget-name {
    flex: 1; text-align: center;
    font-size: var(--fs-md); font-weight: 400; color: var(--text-dim);
    letter-spacing: 0.02em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: var(--font-ui); transition: color 0.15s;
    padding: 0 0.25rem;
  }
  .widget:focus-within .widget-name { color: var(--text); }

  .widget-btn {
    width: 1.5rem; height: 1.5rem;
    border-radius: 0.35rem; border: none;
    background: transparent; color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0; transition: background 0.12s, color 0.12s; flex-shrink: 0;
  }
  .widget-btn:hover { background: var(--bg-hover); color: var(--text-hi); }
  .widget-btn.close:hover { background: var(--red-dim); color: var(--red); }
  .widget-btn svg { width: var(--btn-svg-sz); height: var(--btn-svg-sz); stroke-width: 1.7; }

  .widget-body {
    flex: 1; overflow: auto; min-height: 0; color: var(--text);
    font-family: var(--font-mono); font-size: var(--fs-ui); line-height: 1.6;
  }

  /* ═══════════════════════════════════════════════════
     ICON STRIP
     ═══════════════════════════════════════════════════ */
  #strip {
    width: var(--strip-w); flex: 0 0 var(--strip-w);
    display: flex; flex-direction: column;
    align-items: center; padding: 0.625rem 0 0.625rem var(--pad); gap: 0;
    position: relative; z-index: 20;
  }

  #strip-top { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; padding-bottom: 0.625rem; }

  .strip-launcher {
    width: var(--icon-size); height: var(--icon-size);
    border-radius: var(--icon-r); border: 1px solid var(--a1-dim);
    background: var(--bg-float); color: var(--a1);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
    position: relative;
  }
  .strip-launcher:hover { background: var(--a1-dim); border-color: var(--a1); color: var(--text-hi); transform: scale(1.06); }
  .strip-launcher:active { transform: scale(0.96); }
  .strip-launcher svg { width: var(--strip-svg-sz); height: var(--strip-svg-sz); stroke-width: 1.5; }

  #strip-separator {
    width: var(--icon-size); display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; margin: 0.2rem 0; gap: 0.2rem;
    margin-top: auto;
  }
  #strip-separator::before, #strip-separator::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  #strip-separator span {
    font-size: 0.4rem; letter-spacing: 0.1em; color: var(--text-dim); opacity: 0.35;
    font-family: var(--font-mono); line-height: 1;
  }

  #minimized-section {
    display: flex; flex-direction: column;
    align-items: center; gap: 0.4rem; overflow-y: auto;
    padding-top: 0.2rem; padding-bottom: 0.4rem;
  }

  .min-thumb {
    width: var(--icon-size); height: var(--icon-size);
    border-radius: var(--icon-r); border: 1px solid var(--border);
    background: var(--bg-elevated); color: var(--text-dim);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
    position: relative;
  }
  .min-thumb:hover { background: var(--bg-hover); border-color: var(--border-hi); color: var(--text); transform: scale(1.06); }
  .min-thumb svg { width: var(--thumb-svg-sz); height: var(--thumb-svg-sz); stroke-width: 1.5; }

  .strip-launcher .tip, .min-thumb .tip {
    display: none; position: absolute;
    right: calc(100% + 0.5rem); top: 50%; transform: translateY(-50%);
    background: var(--bg-elevated); border: 1px solid var(--border-hi);
    color: var(--text-hi); padding: 0.2rem 0.5rem; border-radius: 0.3rem;
    font-size: var(--fs-base); white-space: nowrap; pointer-events: none; z-index: 100;
    font-family: var(--font-ui); font-weight: 400;
  }
  .strip-launcher:hover .tip, .min-thumb:hover .tip { display: block; }

  /* ═══════════════════════════════════════════════════
     RESIZE HANDLES
     ═══════════════════════════════════════════════════ */
  .resize-handle-h {
    position: absolute; z-index: 10;
    cursor: col-resize;
    width: 0.6rem;
  }
  .resize-handle-v {
    position: absolute; z-index: 10;
    cursor: row-resize;
    height: 0.6rem;
  }
</style>

<script type="importmap">
{
  "imports": {

<body>

<div id="root">
  <div id="strip">
    <div id="strip-top"></div>
    <div id="strip-separator"><span>open</span></div>
    <div id="minimized-section"></div>
  </div>
  <div id="workspace">
    <div id="workspace-empty"></div>
  </div>
</div>

<script type="module">

import GritsClient                             from './lib/grits/GritsClient.js';
import { makeShell }                           from './lib/gimbal/gsh.js';
import { injectTheme, EASE_SINE, EASE_IN, DUR } from './lib/style/style.js';

injectTheme();

const _gg     = new GritsClient();

// Derive runtime location from module URL.
// Maps https://{server}/{path} to //primary/sites/{server}/live/{path} in Grits space.
const _origin = window.location.origin;

const { serverUrl: _serverUrl, volume: _vol, path: _path } = _gg.fromModule(import.meta.url);

// Strip filename from path to get cwd.
// If the path already ends with / it's a directory — use as-is.
const _cwd = (_path && !_path.endsWith('/'))
  ? _path.split('/').slice(0, -1).join('/')
  : _path || '';

// Initialize shell with correct runtime context
const _shell = makeShell({ fs: _gg });
_shell.serverUrl = _serverUrl || _origin;
_shell.volume = _vol;
_shell.cwd = _cwd;

const evalContext = { fs: _gg, shell: _shell };

const WIDGET_REGISTRY = {
  files: {
    name: 'files', icon: 'files',
    module: './lib/files/gwm-widget.js', _cache: null,
  },
  gterm: {
    name: 'gterm', icon: 'gterm',
    module: './lib/gterm/gwm-widget.js', _cache: null,
  },
  editor: {
    name: 'editor', icon: 'editor',
    module: './lib/codemirror/gwm-widget.js', _cache: null,
  },
};

const ICONS = {
  project:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="8 14 10 16 16 13"/></svg>`,
  minimize: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="5" y1="19" x2="19" y2="19"/></svg>`,
  promote:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  demote:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  close:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  save:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><rect x="7" y="13" width="10" height="6" rx="1" fill="currentColor" stroke="none"/></svg>`,
  saveAs:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><rect x="7" y="13" width="10" height="6" rx="1" fill="currentColor" stroke="none"/><line x1="9" y1="8" x2="15" y2="8"/><polyline points="13 6 15 8 13 10"/></svg>`,
  newDoc:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,  forward:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  parentDir:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`,
  reload:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 3 21 9 15 9"/><path d="M18.49 14a8 8 0 1 1-1.88-8.32L21 9"/></svg>`,

  files:    `<svg viewBox="0 0 24 24" fill="none" stroke="var(--amber-hi)" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
  editor:   `<svg viewBox="0 0 24 24" fill="none" stroke="var(--teal-hi)" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  gterm:    `<svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>`,
};

function getPad() {
  const val = getComputedStyle(document.documentElement).getPropertyValue('--pad').trim();
  return parseFloat(val) * parseFloat(getComputedStyle(document.documentElement).fontSize) || 8;
}

let widgetSeq  = 0;
let masterFrac = 0.60;
const widgets  = new Map();
const domCache = new Map();

// ── Core widget opener ────────────────────────────────────
// mod: ES module object with a default export factory function
// opts: { name, icon, zone, iconRect, ...rest passed to factory }
async function openWidget(mod, opts = {}) {
  const {
    zone     = 'master',
    name     = 'widget',
    icon     = 'editor',
    iconRect = null,
    ...rest
  } = opts;

  const id  = ++widgetSeq;
  const now = Date.now();

  const ex        = [...widgets.values()].filter(w => w.zone === 'stack' || w.zone === 'master');
  const hasMaster = ex.some(w => w.zone === 'master');

  let newRatio = 1;

  if (zone === 'master' && hasMaster) {
    const curMaster = ex.find(w => w.zone === 'master');
    const stackWs   = ex.filter(w => w.zone === 'stack');
    const n         = stackWs.length;
    if (n > 0) {
      stackWs.forEach(w => w.flexRatio = (w.flexRatio || 1) * n / (n + 1));
      curMaster.flexRatio = stackWs.reduce((s, w) => s + w.flexRatio, 0) / (n + 1);
    }
    curMaster.zone       = 'stack';
    curMaster.stackOrder = stackMaxOrder() + 1;
  } else if (zone === 'stack') {
    const stackWs = ex.filter(w => w.zone === 'stack');
    const n       = stackWs.length;
    if (n > 0) {
      stackWs.forEach(w => w.flexRatio = (w.flexRatio || 1) * n / (n + 1));
      newRatio = stackWs.reduce((s, w) => s + w.flexRatio, 0) / (n + 1);
    }
  }

  widgets.set(id, {
    id, name, icon, zone,
    masterHistory: zone === 'master' ? now : 0,
    stackOrder:    zone === 'stack'  ? stackMaxOrder() + 1 : 0,
    flexRatio: newRatio, cellEl: null, cellInstance: null,
  });

  render(true);
  if (iconRect) spawnFromOrigin(id, iconRect);

  try {
    const createWidget = mod.default ?? mod;
    
    // Allow callers to override evalContext (e.g., when launched from a shell)
    const ctx = {... rest.evalContext ?? evalContext};
    ctx.shell = ctx.shell.fork();
    
    const instance     = await Promise.resolve(createWidget({ name, evalContext: ctx, ...rest }));
    const w            = widgets.get(id);
    if (!w) return;

    w.cellEl       = instance.el;
    w.cellInstance = instance;

    // ── Read initial decoration from the instance ─────────
    const dec = instance.decoration ?? {};

    // Override name/icon if the widget declares them
    if (dec.title !== undefined) w.name = dec.title;
    if (dec.icon  !== undefined) w.icon = dec.icon;

    // ── Build and inject the controls object ──────────────
    // The widget mutates its own decoration object then calls controls.update()
    // to tell the shell to re-read it. setTitle / setDirty are thin helpers
    // that do exactly that — widgets can also just mutate + update() directly.
    const controls = {
      update() {
        const el = domCache.get(id); if (!el) return;
        const ww = widgets.get(id); if (!ww) return;
        syncDecoration(el, ww);
      },
      setTitle(str) {
        const ww = widgets.get(id); if (!ww) return;
        const dec = ww.cellInstance?.decoration ?? {};
        dec.title = str;
        ww.name   = str;
        controls.update();
      },
      // Convenience: flips dec.dirty then re-syncs
      setDirty(isDirty) {
        const ww = widgets.get(id); if (!ww) return;
        const dec = ww.cellInstance?.decoration ?? {};
        dec.dirty = isDirty;
        controls.update();
      },
    };

    instance.controls = controls;

    const el = domCache.get(id);
    if (el) {
      syncDecoration(el, w);
      updateWidgetBody(el, w);
      updateWidgetButtons(el, w, w.zone);
    }
  } catch (e) {
    console.error('[openWidget] failed to create widget:', e);
    // Do not swallow — surface to caller for debugging
    throw e;
  }
}

// ── Strip launcher — loads module from registry then opens ─
async function launchFromStrip(registryEntry, iconRect) {
  if (!registryEntry._cache) {
    const mod = await import(registryEntry.module);
    registryEntry._cache = mod;
  }
  await openWidget(registryEntry._cache, {
    name:     registryEntry.name,
    icon:     registryEntry.icon,
    iconRect,
    zone:     'master',
  });
}

// ── Public API ────────────────────────────────────────────
window.gimbal = {
  openWidget,
  WIDGET_REGISTRY,
};


const mkEl = (tag, cls) => { const e = document.createElement(tag); if (cls) e.className = cls; return e; };
const $    = id => document.getElementById(id);

function mkBtn(iconName, label, extraClass, onClick) {
  const b = mkEl('button', `widget-btn${extraClass ? ' '+extraClass : ''}`);
  b.innerHTML = ICONS[iconName] ?? ICONS.gterm; b.title = label;
  b.addEventListener('click', e => { e.stopPropagation(); onClick(); });
  return b;
}

// Create a button from a decoration button descriptor:
// { icon, label, action, enabled? }
function mkDecBtn(desc) {
  const svgContent = typeof desc.icon === 'object' && desc.icon.svg
    ? desc.icon.svg
    : (ICONS[desc.icon] ?? ICONS.gterm);
  const b = mkEl('button', 'widget-btn');
  b.innerHTML = svgContent;
  b.title = desc.label ?? '';
  if (desc.enabled === false) {
    b.disabled = true;
    b.style.opacity = '0.3';
  }
  b.addEventListener('click', e => { e.stopPropagation(); desc.action?.(); });
  // Expose a handle so the widget can update enabled state
  desc._el = b;
  return b;
}

function visibleCount() {
  return [...widgets.values()].filter(w => w.zone === 'master' || w.zone === 'stack').length;
}

function computeLayout() {
  const ws   = $('workspace');
  const W    = ws.clientWidth  - getPad() * 2;
  const H    = ws.clientHeight - getPad() * 2;
  const GAP  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap') || '6') * 16;

  const layout = new Map();
  const masterW = [...widgets.values()].find(w => w.zone === 'master');
  const stackWs = [...widgets.values()].filter(w => w.zone === 'stack')
    .sort((a,b) => a.stackOrder - b.stackOrder);

  const hasStack  = stackWs.length > 0;
  const hasMaster = !!masterW;

  let masterPx = 0;
  if (hasMaster && hasStack) {
    masterPx = Math.round(W * masterFrac - GAP / 2);
  } else if (hasMaster) {
    masterPx = W;
  }

  const stackLeft = hasMaster ? masterPx + GAP : 0;
  const stackPx   = hasMaster && hasStack ? W - masterPx - GAP : W;

  if (hasMaster) {
    layout.set(masterW.id, { left: getPad(), top: getPad(), width: masterPx, height: H });
  }

  if (hasStack) {
    const totalFlex = stackWs.reduce((s,w) => s + (w.flexRatio||1), 0);
    let y = getPad();
    stackWs.forEach((w, i) => {
      const h = Math.round((w.flexRatio / totalFlex) * (H - GAP * (stackWs.length - 1)));
      layout.set(w.id, { left: getPad() + stackLeft, top: y, width: stackPx, height: h });
      y += h + GAP;
    });
  }

  return layout;
}

function applyRect(el, rect, animate) {
  el.style.transition = animate
    ? `left ${DUR} ${EASE_SINE}, top ${DUR} ${EASE_SINE}, width ${DUR} ${EASE_SINE}, height ${DUR} ${EASE_SINE}, opacity ${DUR} ${EASE_SINE}`
    : 'none';
  el.style.left   = rect.left   + 'px';
  el.style.top    = rect.top    + 'px';
  el.style.width  = rect.width  + 'px';
  el.style.height = rect.height + 'px';
}

// ── Decoration sync ───────────────────────────────────────
// Single function that reads decoration fresh from the instance
// and updates the existing title DOM in-place. Called by render()
// on every pass and by controls.update() on demand.
function syncDecoration(wrap, w) {
  const dec = w.cellInstance?.decoration ?? {};

  // Title text
  if (wrap._nameEl) wrap._nameEl.textContent = dec.title ?? w.name;

  // Dirty class (drives green accent via CSS)
  if (wrap._titleEl) wrap._titleEl.classList.toggle('is-dirty', !!dec.dirty);

  // Left-side icon + buttons — rebuild only when the button set may have changed.
  // Keyed on icon + actionability + button count so incidental re-renders don't thrash listeners.
  const leftSig = `${dec.icon ?? w.icon}|${dec.iconAction ? '1' : '0'}|${(dec.leftButtons ?? []).length}`;
  if (wrap._leftSig !== leftSig) {
    wrap._leftSig = leftSig;
    const left = wrap._leftEl;
    left.innerHTML = '';

    const iconEl = mkEl('div', `widget-icon${dec.iconAction ? ' is-action' : ''}`);
    iconEl.innerHTML = (() => {
      if (dec.icon && typeof dec.icon === 'object' && dec.icon.svg) return dec.icon.svg;
      return ICONS[dec.icon ?? w.icon] ?? ICONS.gterm;
    })();
    if (dec.iconAction) {
      iconEl.addEventListener('click', e => { e.stopPropagation(); dec.iconAction(); });
    }
    left.appendChild(iconEl);

    (dec.leftButtons ?? []).forEach(desc => left.appendChild(mkDecBtn(desc)));
  }
}

function buildWidgetEl(w) {
  const wrap = mkEl('div', 'widget');
  wrap.dataset.id = w.id;

  const title = mkEl('div', 'widget-title');
  wrap._titleEl = title;

  const left = mkEl('div', 'title-left');
  wrap._leftEl = left;
  title.appendChild(left);

  const name = mkEl('span', 'widget-name');
  name.textContent = w.name;
  title.appendChild(name);
  wrap._nameEl = name;

  const right = mkEl('div', 'title-right');
  wrap._rightEl = right;
  title.appendChild(right);

  bindTitleDrag(title, w);
  wrap.appendChild(title);

  const body = mkEl('div', 'widget-body');
  body.style.padding = '0';
  wrap._bodyEl = body;
  wrap.appendChild(body);

  return wrap;
}

function updateWidgetButtons(wrap, w, zone) {
  const right = wrap._rightEl;
  right.innerHTML = '';

  // Shell-owned system buttons only — widget decoration buttons live on the left
  right.appendChild(mkBtn('minimize', 'minimize', '', () => minimizeWidget(w.id)));
  if (visibleCount() > 1 && zone === 'stack') {
    right.appendChild(mkBtn('promote', 'make master', '',
      () => promoteWidget(w.id)));
  }
  right.appendChild(mkBtn('close', 'close', 'close', () => closeWidget(w.id)));
}

function updateWidgetBody(wrap, w) {
  const body = wrap._bodyEl;
  body.innerHTML = '';
  if (w.cellEl) {
    body.style.cssText = 'padding:0; flex:1; overflow:auto; min-height:0;';
    body.appendChild(w.cellEl);
  } else {
    body.style.cssText = 'padding:0.75rem; flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:var(--fs-base); font-family:var(--font-ui); overflow:auto; min-height:0;';
    body.textContent = 'loading…';
  }
}

function render(animate = false) {
  const ws     = $('workspace');
  const layout = computeLayout();
  const minEl  = $('minimized-section');

  for (const [id, el] of domCache) {
    if (!layout.has(id)) {
      el.remove();
      domCache.delete(id);
    }
  }

  const emptyEl = $('workspace-empty');
  emptyEl.style.display = layout.size === 0 ? 'flex' : 'none';
  if (layout.size === 0) {
    emptyEl.innerHTML = ICONS.files + '<span>no open windows</span>';
  }

  for (const [id, rect] of layout) {
    const w = widgets.get(id);
    if (!w) continue;

    let el = domCache.get(id);
    if (!el) {
      el = buildWidgetEl(w);
      domCache.set(id, el);
      ws.appendChild(el);
      el.style.opacity = '0';
      el.style.transition = 'none';
      applyRect(el, rect, false);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          el.style.transition = `opacity ${DUR} ${EASE_SINE}`;
          el.style.opacity = '1';
        });
      });
    } else {
      applyRect(el, rect, animate);
    }

    syncDecoration(el, w);
    updateWidgetButtons(el, w, w.zone);
    updateWidgetBody(el, w);
  }

  minEl.innerHTML = '';
  [...widgets.values()].filter(w => w.zone === 'minimized').forEach(w => {
    const thumb = mkEl('div', 'min-thumb');
    thumb.dataset.id = w.id;
    thumb.innerHTML = (ICONS[w.icon]||ICONS.gterm) + `<span class="tip">${w.name}</span>`;
    thumb.addEventListener('click', () => restoreWidget(w.id, thumb.getBoundingClientRect()));
    minEl.appendChild(thumb);
  });

  buildResizeHandles(layout);
}

function renderPositionsOnly(skipId) {
  const layout = computeLayout();
  for (const [id, rect] of layout) {
    if (id === skipId) continue;
    const el = domCache.get(id);
    if (el) applyRect(el, rect, true);
  }
  buildResizeHandles(layout);
}

function buildResizeHandles(layout) {
  const ws = $('workspace');
  ws.querySelectorAll('.resize-handle-h, .resize-handle-v').forEach(e => e.remove());

  const masterW = [...widgets.values()].find(w => w.zone === 'master');
  const stackWs = [...widgets.values()].filter(w => w.zone === 'stack')
    .sort((a,b) => a.stackOrder - b.stackOrder);

  if (masterW && stackWs.length) {
    const mRect = layout.get(masterW.id);
    const handle = mkEl('div', 'resize-handle-h');
    handle.style.left   = (mRect.left + mRect.width) + 'px';
    handle.style.top    = getPad() + 'px';
    handle.style.height = (ws.clientHeight - getPad() * 2) + 'px';
    ws.appendChild(handle);
    bindHResize(handle);
  }

  for (let i = 0; i < stackWs.length - 1; i++) {
    const aRect = layout.get(stackWs[i].id);
    const handle = mkEl('div', 'resize-handle-v');
    handle.style.left  = aRect.left + 'px';
    handle.style.width = aRect.width + 'px';
    handle.style.top   = (aRect.top + aRect.height) + 'px';
    ws.appendChild(handle);
    bindVResize(handle, stackWs[i], stackWs[i+1]);
  }
}

function bindHResize(handle) {
  let dragging = false, startX;
  handle.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const ws = $('workspace');
    const W  = ws.clientWidth - getPad() * 2;
    masterFrac = Math.max(0.15, Math.min(0.85, masterFrac + (e.clientX - startX) / W));
    startX = e.clientX;
    render(false);
  });
  document.addEventListener('mouseup', () => { dragging = false; });
}

function bindVResize(handle, above, below) {
  let dragging = false, startY;
  handle.addEventListener('mousedown', e => {
    dragging = true; startY = e.clientY; e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const ws      = $('workspace');
    const H       = ws.clientHeight - getPad() * 2;
    const stackWs = [...widgets.values()].filter(w => w.zone === 'stack')
      .sort((a,b) => a.stackOrder - b.stackOrder);

    const aboveIdx = stackWs.findIndex(w => w.id === above.id);
    const aboveGroup = stackWs.slice(0, aboveIdx + 1);
    const belowGroup = stackWs.slice(aboveIdx + 1);

    const totalAbove = aboveGroup.reduce((s,w) => s + w.flexRatio, 0);
    const totalBelow = belowGroup.reduce((s,w) => s + w.flexRatio, 0);
    const total      = totalAbove + totalBelow;

    const delta = (e.clientY - startY) / H * total;
    const newAbove = Math.max(0.05 * aboveGroup.length, totalAbove + delta);
    const newBelow = Math.max(0.05 * belowGroup.length, totalBelow - delta);

    const scaleA = newAbove / totalAbove;
    const scaleB = newBelow / totalBelow;
    aboveGroup.forEach(w => w.flexRatio = Math.max(0.05, w.flexRatio * scaleA));
    belowGroup.forEach(w => w.flexRatio = Math.max(0.05, w.flexRatio * scaleB));

    startY = e.clientY;
    render(false);
  });
  document.addEventListener('mouseup', () => { dragging = false; });
}

function spawnFromOrigin(id, originRect) {
  const el = domCache.get(id);
  if (!el) return;
  const layout = computeLayout();
  const dest   = layout.get(id);
  if (!dest) return;

  const ws     = $('workspace').getBoundingClientRect();
  const oLeft  = originRect.left - ws.left;
  const oTop   = originRect.top  - ws.top;

  el.style.transition = 'none';
  el.style.opacity    = '0.15';
  el.style.left       = oLeft + 'px';
  el.style.top        = oTop  + 'px';
  el.style.width      = originRect.width  + 'px';
  el.style.height     = originRect.height + 'px';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      applyRect(el, dest, true);
      el.style.opacity = '1';
    });
  });
}

function animateOut(id) {
  const el = domCache.get(id);
  if (!el) return;
  el.style.transition = `opacity ${DUR} ${EASE_IN}, transform ${DUR} ${EASE_IN}`;
  el.style.opacity    = '0';
  el.style.transform  = 'translateY(1rem) scale(0.97)';
  setTimeout(() => { el.remove(); domCache.delete(id); }, 200);
}

// ── Close with optional onCloseRequest hook ───────────────
async function closeWidget(id) {
  const w = widgets.get(id); if (!w) return;

  const onCloseRequest = w.cellInstance?.decoration?.onCloseRequest;
  if (onCloseRequest) {
    const allowed = await Promise.resolve(onCloseRequest());
    if (!allowed) return;
  }

  animateOut(id);
  w.cellInstance?.destroy();
  const wasMaster = w.zone === 'master';
  widgets.delete(id);
  if (wasMaster) electNewMaster();
  normalizeStackOrder();
  render(true);
}

function minimizeWidget(id) {
  const w = widgets.get(id);
  if (!w) return;

  const el = domCache.get(id);
  const wasMaster = w.zone === 'master';

  w.zone = 'minimized';
  if (wasMaster) electNewMaster();
  normalizeStackOrder();

  domCache.delete(id);
  el.style.zIndex = '9999';
  render(true);

  const thumb = document.querySelector(`#minimized-section .min-thumb[data-id="${id}"]`);
  if (el && thumb) {
    requestAnimationFrame(() => {
      const thumbRect = thumb.getBoundingClientRect();
      const wsRect    = document.getElementById('workspace').getBoundingClientRect();

      const destLeft = thumbRect.left - wsRect.left + thumbRect.width  / 2;
      const destTop  = thumbRect.top  - wsRect.top  + thumbRect.height / 2;

      el.style.transition = `left ${DUR} ${EASE_IN}, top ${DUR} ${EASE_IN}, width ${DUR} ${EASE_IN}, height ${DUR} ${EASE_IN}, opacity ${DUR} ${EASE_IN}`;
      el.style.left    = destLeft + 'px';
      el.style.top     = destTop  + 'px';
      el.style.width   = '0px';
      el.style.height  = '0px';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 300);
    });
  } else {
    if (el) el.remove();
  }
}

function promoteWidget(id) {
  const w   = widgets.get(id); if (!w) return;
  const cur = [...widgets.values()].find(x => x.zone === 'master');
  if (cur) {
    cur.zone       = 'stack';
    cur.stackOrder = w.stackOrder;
    cur.flexRatio  = w.flexRatio;
  }
  w.zone = 'master'; w.masterHistory = Date.now();
  normalizeStackOrder(); render(true);
}

function demoteWidget(id) {
  const w = widgets.get(id); if (!w) return;
  w.zone = 'stack'; w.stackOrder = stackMaxOrder() + 1;
  electNewMaster(); normalizeStackOrder(); render(true);
}

function restoreWidget(id, thumbRect) {
  const w = widgets.get(id); if (!w) return;
  const masterOccupied = [...widgets.values()].some(x => x.zone === 'master');
  if (!masterOccupied && w.masterHistory > 0) { w.zone = 'master'; w.masterHistory = Date.now(); }
  else { w.zone = 'stack'; w.stackOrder = stackMaxOrder() + 1; }
  normalizeStackOrder();
  render(true);
  if (thumbRect) spawnFromOrigin(id, thumbRect);

  // If the widget exposes a focus method, call it after restore
  if (w.cellInstance?.focus) {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        w.cellInstance.focus();
      });
    });
  }
}

function electNewMaster() {
  const best = [...widgets.values()]
    .filter(w => w.zone === 'stack' && w.masterHistory > 0)
    .sort((a,b) => b.masterHistory - a.masterHistory)[0];
  if (best) { best.zone = 'master'; best.masterHistory = Date.now(); }
}

function stackMaxOrder() {
  const orders = [...widgets.values()].filter(w => w.zone === 'stack').map(w => w.stackOrder);
  return orders.length ? Math.max(...orders) : 0;
}
     
function normalizeStackOrder() {
  [...widgets.values()].filter(w => w.zone === 'stack')
    .sort((a,b) => a.stackOrder - b.stackOrder)
    .forEach((w,i) => w.stackOrder = i);
}

function bindTitleDrag(titleEl, w) {
  titleEl.addEventListener('mousedown', e => {
    if (e.target.closest('.widget-btn') || e.target.closest('.widget-icon.is-action')) return;
    e.preventDefault();

    const snapshot   = computeLayout();
    const wsRect     = document.getElementById('workspace').getBoundingClientRect();
    let   lastTarget = null;

    const ws  = document.getElementById('workspace');
    const W   = ws.clientWidth - getPad() * 2;
    const GAP = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap') || '6') * 16;
    const hasMasterAtStart = [...widgets.values()].some(ww => ww.zone === 'master' && ww.id !== w.id);
    const stackLeftSnap = hasMasterAtStart
      ? getPad() + Math.round(W * masterFrac - GAP / 2) + GAP
      : getPad();

    const stackSnap = [...widgets.values()]
      .filter(ww => ww.zone === 'stack' && ww.id !== w.id)
      .sort((a, b) => a.stackOrder - b.stackOrder)
      .map(ww => ({ id: ww.id, stackOrder: ww.stackOrder, rect: snapshot.get(ww.id) }));

    const startMouseX = e.clientX;
    const startMouseY = e.clientY;
    const dragEl = domCache.get(w.id);
    const startElLeft = dragEl ? parseFloat(dragEl.style.left) : 0;
    const startElTop  = dragEl ? parseFloat(dragEl.style.top)  : 0;

    document.body.style.cursor = 'grabbing';
    if (dragEl) {
      dragEl.style.opacity    = '0.5';
      dragEl.style.transition = 'none';
      dragEl.style.zIndex     = '1000';
    }

    function onMove(e) {
      const relX = e.clientX - wsRect.left;
      const relY = e.clientY - wsRect.top;

      if (dragEl) {
        dragEl.style.left = (startElLeft + e.clientX - startMouseX) + 'px';
        dragEl.style.top  = (startElTop  + e.clientY - startMouseY) + 'px';
      }

      const target = resolveDropTarget(relX, relY, stackLeftSnap, stackSnap, hasMasterAtStart);
      if (!targetsEqual(target, lastTarget)) {
        lastTarget = target;
        applyDragTarget(w.id, target);
      }
    }

    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      document.body.style.cursor = '';
      if (dragEl) {
        dragEl.style.opacity = '1';
        dragEl.style.zIndex  = '';
      }
      render(true);
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
}

function applyDragTarget(dragId, target) {
  const dragged = widgets.get(dragId); if (!dragged) return;
  const masterW = [...widgets.values()].find(w => w.zone === 'master');
  const stackWs = [...widgets.values()]
    .filter(w => w.zone === 'stack')
    .sort((a, b) => a.stackOrder - b.stackOrder);

  if (target.zone === 'master') {
    if (dragged.zone === 'master') return;

    if (masterW) {
      masterW.zone       = 'stack';
      masterW.stackOrder = dragged.stackOrder;
      masterW.flexRatio  = dragged.flexRatio;
    }
    dragged.zone          = 'master';
    dragged.masterHistory = Date.now();

  } else {
    const { insertAfter } = target;

    if (dragged.zone === 'master') {
      const newMaster = [...widgets.values()]
        .filter(w => w.zone === 'stack')
        .sort((a, b) => b.masterHistory - a.masterHistory)[0];

      const savedFlex  = newMaster ? newMaster.flexRatio  : 1;
      const savedOrder = newMaster ? newMaster.stackOrder : 0;

      if (newMaster) {
        newMaster.zone          = 'master';
        newMaster.masterHistory = Date.now();
      }

      dragged.zone       = 'stack';
      dragged.flexRatio  = savedFlex;
      dragged.stackOrder = savedOrder;
    }

    const others = [...widgets.values()]
      .filter(w => w.zone === 'stack' && w.id !== dragId)
      .sort((a, b) => a.stackOrder - b.stackOrder);
    const result = [];
    let inserted = false;
    for (const w of others) {
      if (!inserted && w.stackOrder > insertAfter) { result.push(dragged); inserted = true; }
      result.push(w);
    }
    if (!inserted) result.push(dragged);
    result.forEach((w, i) => w.stackOrder = i);
  }

  normalizeStackOrder();
  renderPositionsOnly(dragId);
}

function resolveDropTarget(relX, relY, stackLeftSnap, stackSnap, hasMasterAtStart) {
  if (hasMasterAtStart && relX < stackLeftSnap) {
    return { zone: 'master' };
  }

  let insertAfter = -1;
  for (const { stackOrder, rect } of stackSnap) {
    if (rect && relY >= rect.top + rect.height / 2) insertAfter = stackOrder;
  }

  return { zone: 'stack', insertAfter };
}

function targetsEqual(a, b) {
  if (!a || !b) return false;
  if (a.zone !== b.zone) return false;
  if (a.zone === 'stack') return a.insertAfter === b.insertAfter;
  return true;
}

function buildStrip() {
  const stripTop = $('strip-top');
  Object.entries(WIDGET_REGISTRY).forEach(([id, entry]) => {
    const b = mkEl('div', 'strip-launcher');
    b.innerHTML = (ICONS[entry.icon] || ICONS.gterm) + `<span class="tip">${entry.name}</span>`;
    b.addEventListener('click', () => launchFromStrip(entry, b.getBoundingClientRect()));
    stripTop.appendChild(b);
  });
}

window.addEventListener('resize', () => render(false));

buildStrip();

// Launch initial widgets
(async () => {
  const gtermMod = await import('./lib/gterm/gwm-widget.js');
  await openWidget(gtermMod, { name: 'gterm', icon: 'gterm', zone: 'master', evalContext });
  const filesMod = await import('./lib/files/gwm-widget.js');
  await openWidget(filesMod, { name: 'files', icon: 'files', zone: 'master', evalContext });
})();

</script>
</body>

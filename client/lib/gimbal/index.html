<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gimbal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════
     THEME
     ═══════════════════════════════════════════════════ */
  :root {
    --bg-root:      #080a0e;
    --bg-float:     #0d1017;
    --bg-elevated:  #111520;
    --bg-hover:     #181f2e;
    --bg-active:    #141926;

    --border:       rgba(255,255,255,0.06);
    --border-hi:    rgba(255,255,255,0.11);
    --border-focus: rgba(255,255,255,0.14);

    --text-hi:      #e8edf6;
    --text:         #8fa0b8;
    --text-dim:     #6b7a94;

    --a1:           #4d9ef7;
    --a1-dim:       rgba(77,158,247,0.12);
    --a1-glow:      rgba(77,158,247,0.06);

    --a2:           #3fb97a;
    --a2-dim:       rgba(63,185,122,0.12);

    --red:          #e05555;
    --red-dim:      rgba(224,85,85,0.12);

    --strip-w:      2.8rem;
    --title-h:      2rem;
    --icon-size:    2.4rem;
    --btn-size:     1.75rem;
    --icon-r:       0.5rem;
    --widget-r:     0.625rem;
    --gap:          0.4rem;   /* gap between widgets */

    --ease-sine:    cubic-bezier(0.37, 0, 0.63, 1);
    --ease-in:      cubic-bezier(0.55, 0, 1, 0.45);
    --dur:          0.25s;
  }

  /* ═══════════════════════════════════════════════════
     BASE
     ═══════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg-root);
    color: var(--text);
    font-family: 'Rubik', 'Inter', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 2rem 2rem;
    pointer-events: none; z-index: 0;
  }

  ::-webkit-scrollbar { width: 0.25rem; height: 0.25rem; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 0.125rem; }
  * { scrollbar-width: thin; scrollbar-color: var(--border-hi) transparent; }
  #minimized-section { scrollbar-width: none; }
  #minimized-section::-webkit-scrollbar { display: none; }

  /* ═══════════════════════════════════════════════════
     ROOT LAYOUT — strip on the right, workspace fills rest
     ═══════════════════════════════════════════════════ */
  #root { display: flex; width: 100%; height: 100%; position: relative; z-index: 1; }

  /* Workspace is position:relative so widgets can be position:absolute inside */
  #workspace {
    flex: 1 1 0;
    position: relative;
    min-width: 0;
    /* Padding defines the inset for all widget positioning */
    --pad: 0.5rem;
  }

  /* ═══════════════════════════════════════════════════
     WIDGETS — absolutely positioned, JS controls rects
     ═══════════════════════════════════════════════════ */
  .widget {
    position: absolute;
    display: flex; flex-direction: column;
    background: var(--bg-float);
    border: 1px solid var(--border);
    border-radius: var(--widget-r);
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 0.4rem 1.5rem rgba(0,0,0,0.45),
      0 0.1rem 0.3rem rgba(0,0,0,0.3);
    /* Transition layout properties + fade */
    transition:
      left   var(--dur) var(--ease-sine),
      top    var(--dur) var(--ease-sine),
      width  var(--dur) var(--ease-sine),
      height var(--dur) var(--ease-sine),
      opacity var(--dur) var(--ease-sine),
      border-color 0.25s;
  }
  .widget:focus-within {
    border-color: var(--border-focus);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 0.6rem 1.75rem rgba(0,0,0,0.55),
      0 0.1rem 0.3rem rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.03);
  }

  /* Empty workspace message */
  #workspace-empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.5rem; color: var(--text-dim);
    font-size: 0.75rem; font-family: 'Rubik', sans-serif; opacity: 0.4;
    pointer-events: none;
  }
  #workspace-empty svg { width: 1.25rem; height: 1.25rem; }

  /* ═══════════════════════════════════════════════════
     WIDGET TITLE
     ═══════════════════════════════════════════════════ */
  .widget-title {
    height: var(--title-h);
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 0.3rem;
    flex-shrink: 0; cursor: grab;
    border-radius: var(--widget-r) var(--widget-r) 0 0;
    transition: background 0.15s; overflow: visible;
  }
  .widget:focus-within .widget-title { background: var(--bg-active); }
  .widget-title:active { cursor: grabbing; }

  .title-left  { width: 3.75rem; display: flex; align-items: center; gap: 0.1rem; flex-shrink: 0; }
  .title-right { width: 3.75rem; display: flex; align-items: center; justify-content: flex-end; gap: 0.1rem; flex-shrink: 0; }

  .widget-name {
    flex: 1; text-align: center;
    font-size: 0.875rem; font-weight: 400; color: var(--text-dim);
    letter-spacing: 0.02em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: 'Rubik', sans-serif; transition: color 0.15s;
  }
  .widget:focus-within .widget-name { color: var(--text); }

  .widget-btn {
    width: var(--btn-size); height: var(--btn-size);
    border-radius: 0.35rem; border: none;
    background: transparent; color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0; transition: background 0.12s, color 0.12s; flex-shrink: 0;
  }
  .widget-btn:hover { background: var(--bg-hover); color: var(--text-hi); }
  .widget-btn.close:hover { background: var(--red-dim); color: var(--red); }
  .widget-btn svg { width: 1.2em; height: 1.2em; stroke-width: 1.7; }

  .widget-body {
    flex: 1; overflow: auto; min-height: 0; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 0.8125rem; line-height: 1.6;
  }

  /* ═══════════════════════════════════════════════════
     ICON STRIP
     ═══════════════════════════════════════════════════ */
  #strip {
    width: var(--strip-w); flex: 0 0 var(--strip-w);
    display: flex; flex-direction: column;
    align-items: center; padding: 0.625rem 0; gap: 0;
    position: relative; z-index: 20;
  }

  #strip-top { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; padding-bottom: 0.625rem; }

  .strip-launcher {
    width: var(--icon-size); height: var(--icon-size);
    border-radius: var(--icon-r); border: 1px solid var(--border);
    background: var(--bg-float); color: var(--text-dim);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
    position: relative;
  }
  .strip-launcher:hover { background: var(--bg-hover); border-color: var(--border-hi); color: var(--text); transform: scale(1.06); }
  .strip-launcher:active { transform: scale(0.96); }
  .strip-launcher svg { width: 1.3em; height: 1.3em; stroke-width: 1.5; }
  .strip-launcher::after {
    content: '+'; position: absolute; bottom: 0.2rem; right: 0.25rem;
    font-size: 0.45rem; line-height: 1; color: var(--text-dim); opacity: 0.55;
    font-family: 'JetBrains Mono', monospace; pointer-events: none; transition: opacity 0.15s;
  }
  .strip-launcher:hover::after { opacity: 0.9; }

  #strip-separator {
    width: var(--icon-size); display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; margin: 0.2rem 0; gap: 0.2rem;
    margin-top: auto;
  }
  #strip-separator::before, #strip-separator::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  #strip-separator span {
    font-size: 0.4rem; letter-spacing: 0.1em; color: var(--text-dim); opacity: 0.35;
    font-family: 'JetBrains Mono', monospace; line-height: 1;
  }

  #minimized-section {
    display: flex; flex-direction: column;
    align-items: center; gap: 0.4rem; overflow-y: auto;
    padding-top: 0.2rem; padding-bottom: 0.4rem;
  }

  .min-thumb {
    width: var(--icon-size); height: var(--icon-size);
    border-radius: var(--icon-r); border: 1px solid var(--border);
    background: var(--bg-elevated); color: var(--text-dim);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
    position: relative;
  }
  .min-thumb:hover { background: var(--bg-hover); border-color: var(--border-hi); color: var(--text); transform: scale(1.06); }
  .min-thumb svg { width: 1.1em; height: 1.1em; stroke-width: 1.5; }

  .strip-launcher .tip, .min-thumb .tip {
    display: none; position: absolute;
    right: calc(100% + 0.5rem); top: 50%; transform: translateY(-50%);
    background: var(--bg-elevated); border: 1px solid var(--border-hi);
    color: var(--text-hi); padding: 0.2rem 0.5rem; border-radius: 0.3rem;
    font-size: 0.75rem; white-space: nowrap; pointer-events: none; z-index: 100;
    font-family: 'Rubik', sans-serif; font-weight: 400;
  }
  .strip-launcher:hover .tip, .min-thumb:hover .tip { display: block; }

  /* ═══════════════════════════════════════════════════
     RESIZE HANDLES — invisible strips between widgets
     ═══════════════════════════════════════════════════ */
  .resize-handle-h {
    position: absolute; z-index: 10;
    cursor: col-resize;
    width: 0.6rem;
    /* top/height set by JS */
  }
  .resize-handle-v {
    position: absolute; z-index: 10;
    cursor: row-resize;
    height: 0.6rem;
    /* left/width/top set by JS */
  }

  /* ═══════════════════════════════════════════════════
     DRAG GHOST
     ═══════════════════════════════════════════════════ */
  #drag-ghost {
    position: fixed; pointer-events: none; z-index: 9999;
    background: var(--bg-elevated); border: 1px solid var(--a1);
    border-radius: 0.4rem; padding: 0.25rem 0.7rem;
    font-size: 0.75rem; font-family: 'Rubik', sans-serif;
    color: var(--a1); opacity: 0.92; display: none;
    box-shadow: 0 0.2rem 0.8rem rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<div id="root">
  <div id="workspace">
    <div id="workspace-empty"></div>
  </div>
  <div id="strip">
    <div id="strip-top"></div>
    <div id="strip-separator"><span>open</span></div>
    <div id="minimized-section"></div>
  </div>
</div>
<div id="drag-ghost"></div>

<script type="module">

import GritsClient   from '../grits/GritsClient.js';
import { makeShell } from '../gimbal/gsh.js';

const _origin = window.location.origin;
const _vol    = 'client';
const _libUrl = `${_origin}/grits/v1/content/${_vol}/lib`;
const _gg     = new GritsClient();

const evalContext = { fs: _gg, sh: null, ui: null };

const _shell = makeShell({
  gg:        _gg,
  serverUrl: _origin,
  volume:    _vol,
  cwd:       '/',
  libs:      [{ serverUrl: _origin, volume: _vol, path: 'lib' }],
  evalContext,
});
evalContext.sh = _shell;

const CELL_REGISTRY = {
  terminal: {
    name: 'terminal', icon: 'terminal',
    module: `${_libUrl}/gterm/gwm-widget.js`, _cache: null,
  },
  files: {
    name: 'files', icon: 'files',
    module: `${_libUrl}/files/gwm-widget.js`, _cache: null,
  },
};

async function loadCell(id) {
  const entry = CELL_REGISTRY[id];
  if (!entry) throw new Error(`Unknown cell: ${id}`);
  if (!entry._cache) { const mod = await import(entry.module); entry._cache = mod.default; }
  return entry._cache;
}

const ICONS = {
  terminal: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>`,
  files:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
  minimize: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  promote:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  demote:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  close:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
};

const EASE_SINE = 'cubic-bezier(0.37, 0, 0.63, 1)';
const EASE_IN   = 'cubic-bezier(0.55, 0, 1, 0.45)';
const DUR       = '0.25s';
const PAD       = 8; // workspace padding in px — kept in px since getBoundingClientRect is px

let widgetSeq  = 0;
let masterFrac = 0.60;
const widgets  = new Map();   // id → record
const domCache = new Map();   // id → widget DOM element

evalContext.ui = {
  openWidget({ el, focus, destroy, name = 'widget', icon = 'terminal', zone = 'stack' }) {
    const id = ++widgetSeq;
    widgets.set(id, {
      id, name, icon, zone,
      masterHistory: zone === 'master' ? Date.now() : 0,
      stackOrder:    zone === 'stack'  ? stackMaxOrder() + 1 : 0,
      flexRatio: 1, cellEl: el, cellInstance: { focus, destroy },
    });
    render(true);
    return id;
  }
};

const mkEl = (tag, cls) => { const e = document.createElement(tag); if (cls) e.className = cls; return e; };
const $    = id => document.getElementById(id);

function mkBtn(iconName, label, extraClass, onClick) {
  const b = mkEl('button', `widget-btn${extraClass ? ' '+extraClass : ''}`);
  b.innerHTML = ICONS[iconName]; b.title = label;
  b.addEventListener('click', e => { e.stopPropagation(); onClick(); });
  return b;
}

function visibleCount() {
  return [...widgets.values()].filter(w => w.zone === 'master' || w.zone === 'stack').length;
}

// ─────────────────────────────────────────────────────────
// LAYOUT ENGINE
// Returns a Map of id → { left, top, width, height } in px
// relative to the workspace element's top-left (after padding)
// ─────────────────────────────────────────────────────────
function computeLayout() {
  const ws   = $('workspace');
  const W    = ws.clientWidth  - PAD * 2;
  const H    = ws.clientHeight - PAD * 2;
  const GAP  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap') || '6') * 16;

  const layout = new Map();
  const masterW = [...widgets.values()].find(w => w.zone === 'master');
  const stackWs = [...widgets.values()].filter(w => w.zone === 'stack')
    .sort((a,b) => a.stackOrder - b.stackOrder);

  const hasStack  = stackWs.length > 0;
  const hasMaster = !!masterW;

  let masterPx = 0;
  if (hasMaster && hasStack) {
    masterPx = Math.round(W * masterFrac - GAP / 2);
  } else if (hasMaster) {
    masterPx = W;
  }

  const stackLeft = hasMaster ? masterPx + GAP : 0;
  const stackPx   = hasMaster && hasStack ? W - masterPx - GAP : W;

  if (hasMaster) {
    layout.set(masterW.id, { left: PAD, top: PAD, width: masterPx, height: H });
  }

  if (hasStack) {
    const totalFlex = stackWs.reduce((s,w) => s + (w.flexRatio||1), 0);
    let y = PAD;
    stackWs.forEach((w, i) => {
      const h = Math.round((w.flexRatio / totalFlex) * (H - GAP * (stackWs.length - 1)));
      layout.set(w.id, { left: PAD + stackLeft, top: y, width: stackPx, height: h });
      y += h + GAP;
    });
  }

  return layout;
}

// ─────────────────────────────────────────────────────────
// APPLY RECT to a widget element
// ─────────────────────────────────────────────────────────
function applyRect(el, rect, animate) {
  el.style.transition = animate
    ? `left ${DUR} ${EASE_SINE}, top ${DUR} ${EASE_SINE}, width ${DUR} ${EASE_SINE}, height ${DUR} ${EASE_SINE}, opacity ${DUR} ${EASE_SINE}`
    : 'none';
  el.style.left   = rect.left   + 'px';
  el.style.top    = rect.top    + 'px';
  el.style.width  = rect.width  + 'px';
  el.style.height = rect.height + 'px';
}

// ─────────────────────────────────────────────────────────
// BUILD WIDGET ELEMENT (once per widget)
// ─────────────────────────────────────────────────────────
function buildWidgetEl(w) {
  const wrap = mkEl('div', 'widget');
  wrap.dataset.id = w.id;

  const title = mkEl('div', 'widget-title');
  title.appendChild(mkEl('div', 'title-left'));

  const name = mkEl('span', 'widget-name');
  name.textContent = w.name;
  title.appendChild(name);

  const right = mkEl('div', 'title-right');
  wrap._rightEl = right; // store ref so we can update buttons on re-render
  title.appendChild(right);

  bindTitleDrag(title, w);
  wrap.appendChild(title);

  const body = mkEl('div', 'widget-body');
  body.style.padding = '0';
  wrap._bodyEl = body;
  wrap.appendChild(body);

  return wrap;
}

function updateWidgetButtons(wrap, w, zone) {
  const right = wrap._rightEl;
  right.innerHTML = '';
  right.appendChild(mkBtn('minimize', 'minimize', '', () => minimizeWidget(w.id)));
  if (visibleCount() > 1 && zone === 'stack') {
   right.appendChild(mkBtn('promote', 'make master', '',
      () => promoteWidget(w.id)));
  }
  right.appendChild(mkBtn('close', 'close', 'close', () => closeWidget(w.id)));
}

function updateWidgetBody(wrap, w) {
  const body = wrap._bodyEl;
  body.innerHTML = '';
  if (w.cellEl) {
    body.style.cssText = 'padding:0; flex:1; overflow:auto; min-height:0;';
    body.appendChild(w.cellEl);
  } else {
    body.style.cssText = 'padding:0.75rem; flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:0.75rem; font-family:"Rubik",sans-serif; overflow:auto; min-height:0;';
    body.textContent = 'loading…';
  }
}

// ─────────────────────────────────────────────────────────
// RENDER — keyed: reuse existing DOM elements, create/remove as needed
// ─────────────────────────────────────────────────────────
function render(animate = false) {
  const ws     = $('workspace');
  const layout = computeLayout();
  const minEl  = $('minimized-section');

  // Remove DOM elements for widgets no longer visible
  for (const [id, el] of domCache) {
    if (!layout.has(id)) {
      el.remove();
      domCache.delete(id);
    }
  }

  // Show/hide empty state
  const emptyEl = $('workspace-empty');
  emptyEl.style.display = layout.size === 0 ? 'flex' : 'none';
  if (layout.size === 0) {
    emptyEl.innerHTML = ICONS.files + '<span>no open windows</span>';
  }

  // Create or update each visible widget
  for (const [id, rect] of layout) {
    const w = widgets.get(id);
    if (!w) continue;

    let el = domCache.get(id);
    if (!el) {
      el = buildWidgetEl(w);
      domCache.set(id, el);
      ws.appendChild(el);
      // Start invisible for spawn animation — caller sets initial position before this
      el.style.opacity = '0';
      el.style.transition = 'none';
      // Place immediately at final rect with no transition, then fade in
      applyRect(el, rect, false);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          el.style.transition = `opacity ${DUR} ${EASE_SINE}`;
          el.style.opacity = '1';
        });
      });
    } else {
      applyRect(el, rect, animate);
    }

    // Always update buttons (zone may have changed) and body
    const zone = w.zone;
    updateWidgetButtons(el, w, zone);
    updateWidgetBody(el, w);
  }

  // Minimized thumbnails
  minEl.innerHTML = '';
  [...widgets.values()].filter(w => w.zone === 'minimized').forEach(w => {
    const thumb = mkEl('div', 'min-thumb');
    thumb.dataset.id = w.id;
    thumb.innerHTML = (ICONS[w.icon]||ICONS.terminal) + `<span class="tip">${w.name}</span>`;
    thumb.addEventListener('click', () => restoreWidget(w.id, thumb.getBoundingClientRect()));
    minEl.appendChild(thumb);
  });

  // Rebuild resize handles
  buildResizeHandles(layout);
}

// ─────────────────────────────────────────────────────────
// RESIZE HANDLES
// ─────────────────────────────────────────────────────────
function buildResizeHandles(layout) {
  const ws = $('workspace');
  ws.querySelectorAll('.resize-handle-h, .resize-handle-v').forEach(e => e.remove());

  const masterW = [...widgets.values()].find(w => w.zone === 'master');
  const stackWs = [...widgets.values()].filter(w => w.zone === 'stack')
    .sort((a,b) => a.stackOrder - b.stackOrder);

  // Vertical divider between master and stack
  if (masterW && stackWs.length) {
    const mRect = layout.get(masterW.id);
    const handle = mkEl('div', 'resize-handle-h');
    handle.style.left   = (mRect.left + mRect.width) + 'px';
    handle.style.top    = PAD + 'px';
    handle.style.height = (ws.clientHeight - PAD * 2) + 'px';
    ws.appendChild(handle);
    bindHResize(handle);
  }

  // Horizontal dividers between stack items
  for (let i = 0; i < stackWs.length - 1; i++) {
    const aRect = layout.get(stackWs[i].id);
    const handle = mkEl('div', 'resize-handle-v');
    handle.style.left  = aRect.left + 'px';
    handle.style.width = aRect.width + 'px';
    handle.style.top   = (aRect.top + aRect.height) + 'px';
    handle._above = stackWs[i].id;
    handle._below = stackWs[i+1].id;
    ws.appendChild(handle);
    bindVResize(handle, stackWs[i], stackWs[i+1]);
  }
}

function bindHResize(handle) {
  let dragging = false, startX;
  handle.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const ws = $('workspace');
    const W  = ws.clientWidth - PAD * 2;
    masterFrac = Math.max(0.15, Math.min(0.85, masterFrac + (e.clientX - startX) / W));
    startX = e.clientX;
    render(false);
  });
  document.addEventListener('mouseup', () => { dragging = false; });
}

function bindVResize(handle, above, below) {
  let dragging = false, startY;
  handle.addEventListener('mousedown', e => {
    dragging = true; startY = e.clientY; e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const ws      = $('workspace');
    const H       = ws.clientHeight - PAD * 2;
    const stackWs = [...widgets.values()].filter(w => w.zone === 'stack')
      .sort((a,b) => a.stackOrder - b.stackOrder);

    const aboveIdx = stackWs.findIndex(w => w.id === above.id);
    const aboveGroup = stackWs.slice(0, aboveIdx + 1);
    const belowGroup = stackWs.slice(aboveIdx + 1);

    const totalAbove = aboveGroup.reduce((s,w) => s + w.flexRatio, 0);
    const totalBelow = belowGroup.reduce((s,w) => s + w.flexRatio, 0);
    const total      = totalAbove + totalBelow;

    const delta = (e.clientY - startY) / H * total;
    const newAbove = Math.max(0.05 * aboveGroup.length, totalAbove + delta);
    const newBelow = Math.max(0.05 * belowGroup.length, totalBelow - delta);

    // Scale each group proportionally
    const scaleA = newAbove / totalAbove;
    const scaleB = newBelow / totalBelow;
    aboveGroup.forEach(w => w.flexRatio = Math.max(0.05, w.flexRatio * scaleA));
    belowGroup.forEach(w => w.flexRatio = Math.max(0.05, w.flexRatio * scaleB));

    startY = e.clientY;
    render(false);
  });
  document.addEventListener('mouseup', () => { dragging = false; });
}

// ─────────────────────────────────────────────────────────
// SPAWN FROM ORIGIN
// Sets widget element to start at origin rect, then animates to layout rect
// ─────────────────────────────────────────────────────────
function spawnFromOrigin(id, originRect) {
  const el = domCache.get(id);
  if (!el) return;
  const layout = computeLayout();
  const dest   = layout.get(id);
  if (!dest) return;

  // Convert origin rect (viewport-relative) to workspace-relative
  const ws     = $('workspace').getBoundingClientRect();
  const oLeft  = originRect.left - ws.left;
  const oTop   = originRect.top  - ws.top;

  // Snap to origin immediately
  el.style.transition = 'none';
  el.style.opacity    = '0.15';
  el.style.left       = oLeft + 'px';
  el.style.top        = oTop  + 'px';
  el.style.width      = originRect.width  + 'px';
  el.style.height     = originRect.height + 'px';

  // Animate to destination
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      applyRect(el, dest, true);
      el.style.opacity = '1';
    });
  });
}

// ─────────────────────────────────────────────────────────
// CLOSE ANIMATION
// ─────────────────────────────────────────────────────────
function animateOut(id) {
  const el = domCache.get(id);
  if (!el) return;
  // Animate it away in place before removing
  el.style.transition = `opacity ${DUR} ${EASE_IN}, transform ${DUR} ${EASE_IN}`;
  el.style.opacity    = '0';
  el.style.transform  = 'translateY(1rem) scale(0.97)';
  setTimeout(() => { el.remove(); domCache.delete(id); }, 200);
}

// ─────────────────────────────────────────────────────────
// WINDOW OPERATIONS
// ─────────────────────────────────────────────────────────
async function launchCell(cellId, iconRect) {
  const entry = CELL_REGISTRY[cellId];
  if (!entry) return;
  const id = ++widgetSeq, now = Date.now();

  const ex = [...widgets.values()].filter(w => w.zone === 'stack' || w.zone === 'master');
  const isEmpty = ex.length === 0;
  const zone = isEmpty ? 'master' : 'stack';

  let newRatio = 1;
  if (!isEmpty) {
    const stackWs = ex.filter(w => w.zone === 'stack'), n = stackWs.length;
    if (n > 0) {
      stackWs.forEach(w => w.flexRatio = (w.flexRatio||1) * n / (n+1));
      newRatio = stackWs.reduce((s,w) => s + (w.flexRatio||1), 0) / (n+1);
    }
  }

  widgets.set(id, {
    id, name: entry.name, icon: entry.icon, zone,
    masterHistory: zone === 'master' ? now : 0,
    stackOrder: zone === 'stack' ? stackMaxOrder() + 1 : 0,
    flexRatio: newRatio, cellEl: null, cellInstance: null,
  });

  // Render places the loading placeholder; existing widgets animate to new positions
  render(true);

  // If we have an icon origin, fly the new widget from there
  if (iconRect) {
    spawnFromOrigin(id, iconRect);
  }

  try {
    const w = widgets.get(id);
    const createWidget = await loadCell(cellId);
    const instance = await Promise.resolve(createWidget({ name: entry.name, evalContext }));
    w.cellEl       = instance.el;
    w.cellInstance = instance;
    // Update body content without re-animating positions
    const el = domCache.get(id);
    if (el) updateWidgetBody(el, w);
  } catch(e) { console.error(`Failed to load cell "${cellId}":`, e); }
}

function closeWidget(id) {
  const w = widgets.get(id); if (!w) return;
  animateOut(id);
  w.cellInstance?.destroy();
  const wasMaster = w.zone === 'master';
  widgets.delete(id);
  if (wasMaster) electNewMaster();
  normalizeStackOrder();
  render(true);
}

function minimizeWidget(id) {
  const w = widgets.get(id);
  if (!w) return;

  const el = domCache.get(id);
  const wasMaster = w.zone === 'master';

  w.zone = 'minimized';
  if (wasMaster) electNewMaster();
  normalizeStackOrder();

  // render() will call applyRect on remaining widgets and draw the thumb,
  // but el is no longer in the layout so it won't be touched — however
  // render() also calls el.remove() / domCache.delete() for widgets not
  // in the layout, so we need to rescue el before that happens
  domCache.delete(id);        // ← remove from cache so render() won't touch or delete it
  el.style.zIndex = '9999';   // ← stay on top for the duration of the fly
  render(true);               // ← other widgets animate to new positions, thumb appears

  // Now el is an orphaned-but-still-in-DOM element we fully control
  const thumb = document.querySelector(`#minimized-section .min-thumb[data-id="${id}"]`);
  if (el && thumb) {
    requestAnimationFrame(() => {
      const thumbRect = thumb.getBoundingClientRect();
      const wsRect    = document.getElementById('workspace').getBoundingClientRect();

      const destLeft = thumbRect.left - wsRect.left + thumbRect.width  / 2;
      const destTop  = thumbRect.top  - wsRect.top  + thumbRect.height / 2;

      el.style.transition = `left ${DUR} ${EASE_IN}, top ${DUR} ${EASE_IN}, width ${DUR} ${EASE_IN}, height ${DUR} ${EASE_IN}, opacity ${DUR} ${EASE_IN}`;
      el.style.left    = destLeft + 'px';
      el.style.top     = destTop  + 'px';
      el.style.width   = '0px';
      el.style.height  = '0px';
      el.style.opacity = '0';

      setTimeout(() => el.remove(), 300);
    });
  } else {
    if (el) el.remove();
  }
}

function promoteWidget(id) {
  const w   = widgets.get(id); if (!w) return;
  const cur = [...widgets.values()].find(x => x.zone === 'master');
  if (cur) {
    // Take the promoting widget's place in the stack
    cur.zone       = 'stack';
    cur.stackOrder = w.stackOrder;   // ← take its position
    cur.flexRatio  = w.flexRatio;    // ← take its size
  }
  w.zone = 'master'; w.masterHistory = Date.now();
  normalizeStackOrder(); render(true);
}

function demoteWidget(id) {
  const w = widgets.get(id); if (!w) return;
  w.zone = 'stack'; w.stackOrder = stackMaxOrder() + 1;
  electNewMaster(); normalizeStackOrder(); render(true);
}

function restoreWidget(id, thumbRect) {
  const w = widgets.get(id); if (!w) return;
  const masterOccupied = [...widgets.values()].some(x => x.zone === 'master');
  if (!masterOccupied && w.masterHistory > 0) { w.zone = 'master'; w.masterHistory = Date.now(); }
  else { w.zone = 'stack'; w.stackOrder = stackMaxOrder() + 1; }
  normalizeStackOrder();
  render(true);
  if (thumbRect) spawnFromOrigin(id, thumbRect);
}

function electNewMaster() {
  const best = [...widgets.values()]
    .filter(w => w.zone === 'stack' && w.masterHistory > 0)
    .sort((a,b) => b.masterHistory - a.masterHistory)[0];
  if (best) { best.zone = 'master'; best.masterHistory = Date.now(); }
}

function stackMaxOrder() {
  const orders = [...widgets.values()].filter(w => w.zone === 'stack').map(w => w.stackOrder);
  return orders.length ? Math.max(...orders) : 0;
}

function normalizeStackOrder() {
  [...widgets.values()].filter(w => w.zone === 'stack')
    .sort((a,b) => a.stackOrder - b.stackOrder)
    .forEach((w,i) => w.stackOrder = i);
}

// ─────────────────────────────────────────────────────────
// TITLE BAR DRAG
// ─────────────────────────────────────────────────────────
function bindTitleDrag(titleEl, w) {
  let dragging = false;
  const ghost = $('drag-ghost');
  titleEl.addEventListener('mousedown', e => {
    if (e.target.closest('.widget-btn')) return;
    dragging = true;
    ghost.textContent = `↳ ${w.name}`; ghost.style.display = 'block';
    moveGhost(e); e.preventDefault();
  });
  document.addEventListener('mousemove', e => { if (dragging) moveGhost(e); });
  document.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false; ghost.style.display = 'none';
    // Check drop zone by comparing with computed layout rects
    const wsEl  = $('workspace');
    const wsRect = wsEl.getBoundingClientRect();
    const relX   = e.clientX - wsRect.left;
    const relY   = e.clientY - wsRect.top;
    const layout = computeLayout();
    const masterW = [...widgets.values()].find(x => x.zone === 'master');
    const stackWs = [...widgets.values()].filter(x => x.zone === 'stack');

    // Is cursor in master zone?
    const masterRect = masterW ? layout.get(masterW.id) : null;
    const inMaster = masterRect &&
      relX >= masterRect.left && relX <= masterRect.left + masterRect.width &&
      relY >= masterRect.top  && relY <= masterRect.top  + masterRect.height;

    // Is cursor in stack zone?
    const stackLeft = masterRect ? masterRect.left + masterRect.width : PAD;
    const inStack   = relX >= stackLeft && stackWs.length > 0;

    if (inMaster && w.zone !== 'master') promoteWidget(w.id);
    else if (inStack && w.zone !== 'stack') demoteWidget(w.id);
  });
  function moveGhost(e) {
    ghost.style.left = (e.clientX + 14) + 'px';
    ghost.style.top  = (e.clientY + 10) + 'px';
  }
}

// ─────────────────────────────────────────────────────────
// STRIP
// ─────────────────────────────────────────────────────────
function buildStrip() {
  const stripTop = $('strip-top');
  Object.entries(CELL_REGISTRY).forEach(([id, entry]) => {
    const b = mkEl('div', 'strip-launcher');
    b.innerHTML = (ICONS[entry.icon]||ICONS.terminal) + `<span class="tip">${entry.name}</span>`;
    b.addEventListener('click', () => {
      launchCell(id, b.getBoundingClientRect());
    });
    stripTop.appendChild(b);
  });
}

// Handle window resize
window.addEventListener('resize', () => render(false));

buildStrip();
launchCell('files', null);
launchCell('terminal', null);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gimbal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════
     THEME
     ═══════════════════════════════════════════════════ */
  :root {
    --bg-root:      #080a0e;
    --bg-float:     #0d1017;
    --bg-elevated:  #111520;
    --bg-hover:     #181f2e;
    --bg-active:    #141926;

    --border:       rgba(255,255,255,0.06);
    --border-hi:    rgba(255,255,255,0.11);
    --border-focus: rgba(255,255,255,0.14);

    --text-hi:      #e8edf6;
    --text:         #8fa0b8;
    --text-dim:     #6b7a94;

    --a1:           #4d9ef7;
    --a1-dim:       rgba(77,158,247,0.12);
    --a1-glow:      rgba(77,158,247,0.06);

    --a2:           #3fb97a;
    --a2-dim:       rgba(63,185,122,0.12);

    --red:          #e05555;
    --red-dim:      rgba(224,85,85,0.12);

    --strip-w:      2.8rem;
    --title-h:      2rem;
    --icon-size:    2.4rem;
    --btn-size:     1.75rem;
    --icon-r:       0.5rem;
    --widget-r:     0.625rem;
    --divider-hit:  0.5rem;

    /* Sine-curve easing — slow start, fast middle, slow end */
    --ease-sine:    cubic-bezier(0.37, 0, 0.63, 1);
    --ease-in:      cubic-bezier(0.55, 0, 1, 0.45);
    --dur:          1.5s;
  }

  /* ═══════════════════════════════════════════════════
     BASE
     ═══════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg-root);
    color: var(--text);
    font-family: 'Rubik', 'Inter', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 2rem 2rem;
    pointer-events: none; z-index: 0;
  }

  ::-webkit-scrollbar { width: 0.25rem; height: 0.25rem; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 0.125rem; }
  * { scrollbar-width: thin; scrollbar-color: var(--border-hi) transparent; }
  #minimized-section { scrollbar-width: none; }
  #minimized-section::-webkit-scrollbar { display: none; }

  /* ═══════════════════════════════════════════════════
     LAYOUT
     ═══════════════════════════════════════════════════ */
  #root { display: flex; width: 100%; height: 100%; position: relative; z-index: 1; }

  #workspace {
    flex: 1 1 0; display: flex; min-width: 0;
    padding: 0.5rem 0.4rem 0.5rem 0.5rem; position: relative;
  }

  #master { flex: 0 0 auto; position: relative; display: flex; flex-direction: column; }
  #stack  { flex: 1 1 0; display: flex; flex-direction: column; min-width: 0; position: relative; }

  /* ═══════════════════════════════════════════════════
     DIVIDERS
     ═══════════════════════════════════════════════════ */
  #ms-divider {
    width: var(--divider-hit); flex: 0 0 var(--divider-hit);
    cursor: col-resize; z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }
  #ms-divider::after {
    content: ''; width: 1px; height: 1.75rem;
    background: var(--border); border-radius: 1px;
    transition: background 0.2s, height 0.2s;
  }
  #ms-divider:hover::after, #ms-divider.dragging::after { background: var(--a1); height: 2.75rem; }

  .stack-divider {
    height: var(--divider-hit); flex: 0 0 var(--divider-hit);
    cursor: row-resize; z-index: 5;
    display: flex; align-items: center; justify-content: center;
  }
  .stack-divider::after {
    content: ''; height: 1px; width: 2rem;
    background: var(--border); border-radius: 1px;
    transition: background 0.2s, width 0.2s;
  }
  .stack-divider:hover::after, .stack-divider.dragging::after { background: var(--a1); width: 2.75rem; }

  /* ═══════════════════════════════════════════════════
     ICON STRIP
     ═══════════════════════════════════════════════════ */
  #strip {
    width: var(--strip-w); flex: 0 0 var(--strip-w);
    display: flex; flex-direction: column;
    align-items: center; padding: 0.625rem 0; gap: 0;
    position: relative; z-index: 20;
  }

  #strip-top { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; padding-bottom: 0.625rem; }

  .strip-launcher {
    width: var(--icon-size); height: var(--icon-size);
    border-radius: var(--icon-r); border: 1px solid var(--border);
    background: var(--bg-float); color: var(--text-dim);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
    position: relative;
  }
  .strip-launcher:hover { background: var(--bg-hover); border-color: var(--border-hi); color: var(--text); transform: scale(1.06); }
  .strip-launcher:active { transform: scale(0.96); }
  .strip-launcher svg { width: 1.3em; height: 1.3em; stroke-width: 1.5; }
  .strip-launcher::after {
    content: '+'; position: absolute; bottom: 0.2rem; right: 0.25rem;
    font-size: 0.45rem; line-height: 1; color: var(--text-dim); opacity: 0.55;
    font-family: 'JetBrains Mono', monospace; pointer-events: none; transition: opacity 0.15s;
  }
  .strip-launcher:hover::after { opacity: 0.9; }

  #strip-separator {
    width: var(--icon-size); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin: 0.2rem 0; gap: 0.2rem;
  }
  #strip-separator::before, #strip-separator::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  #strip-separator span {
    font-size: 0.4rem; letter-spacing: 0.1em; color: var(--text-dim); opacity: 0.35;
    font-family: 'JetBrains Mono', monospace; line-height: 1;
  }

  #minimized-section {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 0.4rem; overflow-y: auto;
    padding-top: 0.2rem; padding-bottom: 0.4rem;
  }

  .min-thumb {
    width: var(--icon-size); height: var(--icon-size);
    border-radius: var(--icon-r); border: 1px solid var(--border);
    background: var(--bg-elevated); color: var(--text-dim);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
    position: relative;
  }
  .min-thumb:hover { border-color: var(--a1); color: var(--a1); background: var(--a1-glow); transform: scale(1.06); }
  .min-thumb svg { width: 1.1em; height: 1.1em; stroke-width: 1.5; }

  .strip-launcher .tip, .min-thumb .tip {
    display: none; position: absolute;
    right: calc(100% + 0.5rem); top: 50%; transform: translateY(-50%);
    background: var(--bg-elevated); border: 1px solid var(--border-hi);
    color: var(--text-hi); padding: 0.2rem 0.5rem; border-radius: 0.3rem;
    font-size: 0.75rem; white-space: nowrap; pointer-events: none; z-index: 100;
    font-family: 'Rubik', sans-serif; font-weight: 400;
  }
  .strip-launcher:hover .tip, .min-thumb:hover .tip { display: block; }

  /* ═══════════════════════════════════════════════════
     WIDGET CHROME
     ═══════════════════════════════════════════════════ */
  .widget {
    display: flex; flex-direction: column;
    background: var(--bg-float); border: 1px solid var(--border);
    border-radius: var(--widget-r); overflow: hidden; position: relative; min-height: 0;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 0.4rem 1.5rem rgba(0,0,0,0.45), 0 0.1rem 0.3rem rgba(0,0,0,0.3);
    transition: border-color 0.15s, box-shadow 0.15s;
    will-change: transform;
  }
  .widget:focus-within {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 0.6rem 1.75rem rgba(0,0,0,0.55), 0 0.1rem 0.3rem rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .widget.in-master { flex: 1; }

  .widget-title {
    height: var(--title-h); background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 0.3rem;
    flex-shrink: 0; cursor: grab;
    border-radius: var(--widget-r) var(--widget-r) 0 0;
    transition: background 0.15s; overflow: visible;
  }
  .widget:focus-within .widget-title { background: var(--bg-active); }
  .widget-title:active { cursor: grabbing; }

  .title-left  { width: 3.75rem; display: flex; align-items: center; gap: 0.1rem; flex-shrink: 0; }
  .title-right { width: 3.75rem; display: flex; align-items: center; justify-content: flex-end; gap: 0.1rem; flex-shrink: 0; }

  .widget-name {
    flex: 1; text-align: center;
    font-size: 0.875rem; font-weight: 400; color: var(--text-dim);
    letter-spacing: 0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: 'Rubik', sans-serif; transition: color 0.15s;
  }
  .widget:focus-within .widget-name { color: var(--text); }

  .widget-btn {
    width: var(--btn-size); height: var(--btn-size);
    border-radius: 0.35rem; border: none;
    background: transparent; color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0; transition: background 0.12s, color 0.12s; flex-shrink: 0;
  }
  .widget-btn:hover { background: var(--bg-hover); color: var(--text-hi); }
  .widget-btn.close:hover { background: var(--red-dim); color: var(--red); }
  .widget-btn svg { width: 1.2em; height: 1.2em; stroke-width: 1.7; }

  .widget-body {
    flex: 1; overflow: auto; min-height: 0; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 0.8125rem; line-height: 1.6;
  }

  #drag-ghost {
    position: fixed; pointer-events: none; z-index: 9999;
    background: var(--bg-elevated); border: 1px solid var(--a1);
    border-radius: 0.4rem; padding: 0.25rem 0.7rem;
    font-size: 0.75rem; font-family: 'Rubik', sans-serif;
    color: var(--a1); opacity: 0.92; display: none;
    box-shadow: 0 0.2rem 0.8rem rgba(0,0,0,0.5);
  }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.5rem; color: var(--text-dim);
    font-size: 0.75rem; font-family: 'Rubik', sans-serif; opacity: 0.4;
  }
  .empty-state svg { width: 1.25rem; height: 1.25rem; }
</style>
</head>
<body>

<div id="root">
  <div id="workspace">
    <div id="master"></div>
    <div id="ms-divider"></div>
    <div id="stack"></div>
  </div>
  <div id="strip">
    <div id="strip-top"></div>
    <div id="strip-separator"><span>open</span></div>
    <div id="minimized-section"></div>
  </div>
</div>
<div id="drag-ghost"></div>

<script type="module">

import GritsClient   from '../grits/GritsClient.js';
import { makeShell } from '../gimbal/gsh.js';

const _origin = window.location.origin;
const _vol    = 'client';
const _libUrl = `${_origin}/grits/v1/content/${_vol}/lib`;
const _gg     = new GritsClient();

const evalContext = { fs: _gg, sh: null, ui: null };

const _shell = makeShell({
  gg:        _gg,
  serverUrl: _origin,
  volume:    _vol,
  cwd:       '/',
  libs:      [{ serverUrl: _origin, volume: _vol, path: 'lib' }],
  evalContext,
});
evalContext.sh = _shell;

const CELL_REGISTRY = {
  terminal: {
    name: 'terminal', icon: 'terminal', defaultZone: 'stack',
    module: `${_libUrl}/gterm/gwm-widget.js`, _cache: null,
  },
  files: {
    name: 'files', icon: 'files', defaultZone: 'master',
    module: `${_libUrl}/files/gwm-widget.js`, _cache: null,
  },
};

async function loadCell(id) {
  const entry = CELL_REGISTRY[id];
  if (!entry) throw new Error(`Unknown cell: ${id}`);
  if (!entry._cache) { const mod = await import(entry.module); entry._cache = mod.default; }
  return entry._cache;
}

const ICONS = {
  terminal: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>`,
  files:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
  minimize: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  promote:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  demote:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  close:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
};

// Easing strings — match CSS vars
const EASE_SINE = 'cubic-bezier(0.37, 0, 0.63, 1)';
const EASE_IN   = 'cubic-bezier(0.55, 0, 1, 0.45)';
const DUR       = '1.5s';

let widgetSeq  = 0;
let masterFrac = 0.60;
const widgets  = new Map();

// Store the icon rect that spawned each new widget id
const spawnOrigins = new Map();

evalContext.ui = {
  openWidget({ el, focus, destroy, name = 'widget', icon = 'terminal', zone = 'stack' }) {
    const id = ++widgetSeq;
    widgets.set(id, {
      id, name, icon, zone,
      masterHistory: zone === 'master' ? Date.now() : 0,
      stackOrder:    zone === 'stack'  ? stackMaxOrder() + 1 : 0,
      flexRatio: 1, cellEl: el, cellInstance: { focus, destroy },
    });
    render(true);
    return id;
  }
};

const mkEl = (tag, cls) => { const e = document.createElement(tag); if (cls) e.className = cls; return e; };
const $    = id => document.getElementById(id);

function mkBtn(iconName, label, extraClass, onClick) {
  const b = mkEl('button', `widget-btn${extraClass ? ' '+extraClass : ''}`);
  b.innerHTML = ICONS[iconName]; b.title = label;
  b.addEventListener('click', e => { e.stopPropagation(); onClick(); });
  return b;
}

function visibleCount() {
  return [...widgets.values()].filter(w => w.zone === 'master' || w.zone === 'stack').length;
}

// ─────────────────────────────────────────────────────────
// FLIP + SPAWN ANIMATION
// ─────────────────────────────────────────────────────────
function snapshotPositions() {
  const map = new Map();
  document.querySelectorAll('.widget[data-id]').forEach(el => {
    map.set(el.dataset.id, el.getBoundingClientRect());
  });
  return map;
}

function applyFlip(before) {
  document.querySelectorAll('.widget[data-id]').forEach(el => {
    const id  = el.dataset.id;
    const old = before.get(id);

    if (!old) {
      // New widget — check for a spawn origin
      const numId  = parseInt(id);
      const origin = spawnOrigins.get(numId);
      spawnOrigins.delete(numId);

      const now = el.getBoundingClientRect();

      if (origin) {
        // Animate from icon position to final position
        const dx = (origin.left + origin.width  / 2) - (now.left + now.width  / 2);
        const dy = (origin.top  + origin.height / 2) - (now.top  + now.height / 2);
        const sw = origin.width  / now.width;
        const sh = origin.height / now.height;
        el.style.transition    = 'none';
        el.style.transformOrigin = 'center center';
        el.style.transform     = `translate(${dx}px, ${dy}px) scale(${sw}, ${sh})`;
        el.style.opacity       = '0.2';
      } else {
        // No origin — simple scale-in
        el.style.transition = 'none';
        el.style.transform  = 'scale(0.92)';
        el.style.opacity    = '0';
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          el.style.transition    = `transform ${DUR} ${EASE_SINE}, opacity ${DUR} ${EASE_SINE}`;
          el.style.transform     = '';
          el.style.transformOrigin = '';
          el.style.opacity       = '';
        });
      });
      return;
    }

    // Existing widget that moved — FLIP it
    const now = el.getBoundingClientRect();
    const dx  = old.left - now.left;
    const dy  = old.top  - now.top;
    const dw  = old.width  / now.width;
    const dh  = old.height / now.height;

    if (Math.abs(dx) < 1 && Math.abs(dy) < 1 && Math.abs(dw - 1) < 0.01 && Math.abs(dh - 1) < 0.01) return;

    el.style.transition    = 'none';
    el.style.transformOrigin = 'top left';
    el.style.transform     = `translate(${dx}px, ${dy}px) scale(${dw}, ${dh})`;

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.style.transition    = `transform ${DUR} ${EASE_SINE}`;
        el.style.transform     = '';
        el.style.transformOrigin = '';
      });
    });
  });
}

// ─────────────────────────────────────────────────────────
// CLOSE / MINIMIZE ANIMATION
// ─────────────────────────────────────────────────────────
function animateClose(id) {
  const el = document.querySelector(`.widget[data-id="${id}"]`);
  if (!el) return;
  const rect  = el.getBoundingClientRect();
  const ghost = el.cloneNode(true);
  ghost.querySelectorAll('input, button, textarea').forEach(i => i.disabled = true);
  Object.assign(ghost.style, {
    position:      'fixed',
    left:          rect.left   + 'px',
    top:           rect.top    + 'px',
    width:         rect.width  + 'px',
    height:        rect.height + 'px',
    pointerEvents: 'none',
    zIndex:        '9998',
    borderRadius:  'var(--widget-r)',
    overflow:      'hidden',
    transition:    'none',
    opacity:       '1',
    transform:     'none',
  });
  document.body.appendChild(ghost);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      ghost.style.transition = `transform ${DUR} ${EASE_IN}, opacity ${DUR} ${EASE_IN}`;
      ghost.style.transform  = 'translateY(1.25rem) scale(0.96)';
      ghost.style.opacity    = '0';
      setTimeout(() => ghost.remove(), 200);
    });
  });
}

// ─────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────
function render(animate = false) {
  const before = animate ? snapshotPositions() : null;

  const masterEl = $('master'), stackEl = $('stack');
  const minEl = $('minimized-section'), msd = $('ms-divider');

  const masterW = [...widgets.values()].find(w => w.zone === 'master');
  const stackWs = [...widgets.values()].filter(w => w.zone === 'stack').sort((a,b) => a.stackOrder - b.stackOrder);
  const minWs   = [...widgets.values()].filter(w => w.zone === 'minimized');

  msd.style.display = (masterW && stackWs.length) ? '' : 'none';
  masterEl.style.width = masterW && stackWs.length ? (masterFrac*100)+'%'
    : masterW ? '100%' : stackWs.length ? '0' : '100%';

  masterEl.innerHTML = '';
  if (masterW) {
    masterEl.appendChild(buildWidgetEl(masterW, 'master'));
  } else {
    const emp = mkEl('div', 'empty-state');
    emp.innerHTML = ICONS.files + '<span>no master window</span>';
    masterEl.appendChild(emp);
  }

  stackEl.innerHTML = '';
  if (stackWs.length) {
    const total = stackWs.reduce((s,w) => s + (w.flexRatio||1), 0);
    stackWs.forEach(w => w.flexRatio = (w.flexRatio||1) / total);
    stackWs.forEach((w, i) => {
      const wEl = buildWidgetEl(w, 'stack');
      wEl.style.flex = `${w.flexRatio} 1 0`;
      wEl.style.minHeight = '3.5rem';
      stackEl.appendChild(wEl);
      if (i < stackWs.length - 1) {
        const div = mkEl('div', 'stack-divider');
        div.dataset.above = w.id; div.dataset.below = stackWs[i+1].id;
        stackEl.appendChild(div);
        bindStackDivider(div);
      }
    });
  }

  minEl.innerHTML = '';
  minWs.forEach(w => {
    const thumb = mkEl('div', 'min-thumb');
    thumb.innerHTML = (ICONS[w.icon]||ICONS.terminal) + `<span class="tip">${w.name}</span>`;
    thumb.addEventListener('click', () => restoreWidget(w.id));
    minEl.appendChild(thumb);
  });

  if (before) applyFlip(before);
}

function buildWidgetEl(w, zone) {
  const wrap = mkEl('div', `widget in-${zone}`);
  wrap.dataset.id = w.id;

  const title = mkEl('div', 'widget-title');
  title.appendChild(mkEl('div', 'title-left'));

  const name = mkEl('span', 'widget-name');
  name.textContent = w.name;
  title.appendChild(name);

  const right = mkEl('div', 'title-right');
  right.appendChild(mkBtn('minimize', 'minimize', '', () => minimizeWidget(w.id)));
  if (visibleCount() > 1) {
    right.appendChild(mkBtn(
      zone === 'stack' ? 'promote' : 'demote',
      zone === 'stack' ? 'make master' : 'send to stack',
      '', () => zone === 'stack' ? promoteWidget(w.id) : demoteWidget(w.id)
    ));
  }
  right.appendChild(mkBtn('close', 'close', 'close', () => closeWidget(w.id)));
  title.appendChild(right);

  bindTitleDrag(title, w);
  wrap.appendChild(title);

  const body = mkEl('div', 'widget-body');
  body.style.padding = '0';
  if (w.cellEl) {
    body.appendChild(w.cellEl);
    if (w.cellInstance?.mount) requestAnimationFrame(() => w.cellInstance.mount());
  } else {
    body.style.cssText += '; padding:0.75rem; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:0.75rem; font-family:"Rubik",sans-serif;';
    body.textContent = 'loading…';
  }
  wrap.appendChild(body);
  return wrap;
}

// ─────────────────────────────────────────────────────────
// WINDOW OPERATIONS
// ─────────────────────────────────────────────────────────
async function launchCell(cellId, iconRect) {
  const entry = CELL_REGISTRY[cellId];
  if (!entry) return;
  const id = ++widgetSeq, now = Date.now(), zone = entry.defaultZone;

  if (zone === 'master') {
    const cur = [...widgets.values()].find(w => w.zone === 'master');
    if (cur) { cur.zone = 'stack'; cur.stackOrder = stackMaxOrder() + 1; }
  }

  let newRatio = 1;
  if (zone === 'stack') {
    const ex = [...widgets.values()].filter(w => w.zone === 'stack'), n = ex.length;
    if (n > 0) {
      const total = ex.reduce((s,w) => s + (w.flexRatio||1), 0);
      ex.forEach(w => w.flexRatio = (w.flexRatio||1) * n / (n+1));
      newRatio = total / (n+1);
    }
  }

  const record = {
    id, name: entry.name, icon: entry.icon, zone,
    masterHistory: zone === 'master' ? now : 0,
    stackOrder: zone === 'stack' ? stackMaxOrder() + 1 : 0,
    flexRatio: newRatio, cellEl: null, cellInstance: null,
  };
  widgets.set(id, record);
  render(true);

  try {
    const createWidget = await loadCell(cellId);
    const instance = await Promise.resolve(createWidget({ name: entry.name, evalContext }));
    record.cellEl       = instance.el;
    record.cellInstance = instance;
    if (iconRect) spawnOrigins.set(id, iconRect);  // ← moved here
    render(true);                                   // ← change false to true
  } catch(e) { console.error(`Failed to load cell "${cellId}":`, e); }
}

function closeWidget(id) {
  const w = widgets.get(id); if (!w) return;
  animateClose(id);
  w.cellInstance?.destroy();
  const wasMaster = w.zone === 'master';
  widgets.delete(id);
  if (wasMaster) electNewMaster();
  normalizeStackOrder();
  render(true);
}

function minimizeWidget(id) {
  const w = widgets.get(id); if (!w) return;
  animateClose(id);
  const wasMaster = w.zone === 'master';
  w.zone = 'minimized';
  if (wasMaster) electNewMaster();
  normalizeStackOrder();
  render(true);
}

function promoteWidget(id) {
  const w = widgets.get(id); if (!w) return;
  const cur = [...widgets.values()].find(x => x.zone === 'master');
  if (cur) { cur.zone = 'stack'; cur.stackOrder = stackMaxOrder() + 1; }
  w.zone = 'master'; w.masterHistory = Date.now();
  normalizeStackOrder(); render(true);
}

function demoteWidget(id) {
  const w = widgets.get(id); if (!w) return;
  w.zone = 'stack'; w.stackOrder = stackMaxOrder() + 1;
  electNewMaster(); normalizeStackOrder(); render(true);
}

function restoreWidget(id) {
  const w = widgets.get(id); if (!w) return;
  // Animate from the minimized thumb
  const thumb = document.querySelector(`.min-thumb[data-restore="${id}"]`);
  const origin = thumb ? thumb.getBoundingClientRect() : null;
  if (origin) spawnOrigins.set(id, origin);
  const masterOccupied = [...widgets.values()].some(x => x.zone === 'master');
  if (!masterOccupied && w.masterHistory > 0) { w.zone = 'master'; w.masterHistory = Date.now(); }
  else { w.zone = 'stack'; w.stackOrder = stackMaxOrder() + 1; }
  normalizeStackOrder(); render(true);
}

function electNewMaster() {
  const best = [...widgets.values()]
    .filter(w => w.zone === 'stack' && w.masterHistory > 0)
    .sort((a,b) => b.masterHistory - a.masterHistory)[0];
  if (best) { best.zone = 'master'; best.masterHistory = Date.now(); }
}

function stackMaxOrder() {
  const orders = [...widgets.values()].filter(w => w.zone === 'stack').map(w => w.stackOrder);
  return orders.length ? Math.max(...orders) : 0;
}

function normalizeStackOrder() {
  [...widgets.values()].filter(w => w.zone === 'stack')
    .sort((a,b) => a.stackOrder - b.stackOrder)
    .forEach((w,i) => w.stackOrder = i);
}

(function() {
  const div = $('ms-divider');
  let dragging = false, startX, startFrac;
  div.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; startFrac = masterFrac;
    div.classList.add('dragging'); e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const ws = $('workspace').getBoundingClientRect();
    masterFrac = Math.max(0.15, Math.min(0.85, startFrac + (e.clientX - startX) / ws.width));
    $('master').style.width = (masterFrac * 100) + '%';
  });
  document.addEventListener('mouseup', () => { dragging = false; div.classList.remove('dragging'); });
})();

function bindStackDivider(divEl) {
  let dragging = false, startY, aboveW, belowW;
  divEl.addEventListener('mousedown', e => {
    dragging = true; startY = e.clientY;
    aboveW = widgets.get(parseInt(divEl.dataset.above));
    belowW = widgets.get(parseInt(divEl.dataset.below));
    divEl.classList.add('dragging'); e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = $('stack').getBoundingClientRect();
    const total = [...widgets.values()].filter(w => w.zone === 'stack').reduce((s,w) => s + w.flexRatio, 0);
    const delta = (e.clientY - startY) / rect.height * total;
    aboveW.flexRatio = Math.max(0.05, aboveW.flexRatio + delta);
    belowW.flexRatio = Math.max(0.05, belowW.flexRatio - delta);
    startY = e.clientY; render(false);
  });
  document.addEventListener('mouseup', () => { dragging = false; divEl.classList.remove('dragging'); });
}

function bindTitleDrag(titleEl, w) {
  let dragging = false;
  const ghost = $('drag-ghost');
  titleEl.addEventListener('mousedown', e => {
    if (e.target.closest('.widget-btn')) return;
    dragging = true;
    ghost.textContent = `↳ ${w.name}`; ghost.style.display = 'block';
    moveGhost(e); e.preventDefault();
  });
  document.addEventListener('mousemove', e => { if (dragging) moveGhost(e); });
  document.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false; ghost.style.display = 'none';
    const mr = $('master').getBoundingClientRect();
    const sr = $('stack').getBoundingClientRect();
    const inM = e.clientX >= mr.left && e.clientX <= mr.right && e.clientY >= mr.top && e.clientY <= mr.bottom;
    const inS = e.clientX >= sr.left && e.clientX <= sr.right && e.clientY >= sr.top && e.clientY <= sr.bottom;
    if (inM && w.zone !== 'master') promoteWidget(w.id);
    else if (inS && w.zone !== 'stack') demoteWidget(w.id);
  });
  function moveGhost(e) {
    ghost.style.left = (e.clientX + 14) + 'px';
    ghost.style.top  = (e.clientY + 10) + 'px';
  }
}

// ─────────────────────────────────────────────────────────
// STRIP — capture icon rect on click for spawn animation
// ─────────────────────────────────────────────────────────
function buildStrip() {
  const stripTop = $('strip-top');
  Object.entries(CELL_REGISTRY).forEach(([id, entry]) => {
    const b = mkEl('div', 'strip-launcher');
    b.innerHTML = (ICONS[entry.icon]||ICONS.terminal) + `<span class="tip">${entry.name}</span>`;
    b.addEventListener('click', () => {
      const iconRect = b.getBoundingClientRect();
      launchCell(id, iconRect);
    });
    stripTop.appendChild(b);
  });
}

buildStrip();
// Initial launch — no icon rect, just appear
launchCell('files', null);
launchCell('terminal', null);

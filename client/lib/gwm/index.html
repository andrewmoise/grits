<!DOCTYPE html>
<html lang="en">
<head>
<!--
  @cell gimbal-shell
  @version 0.1
  @about
    Gimbal: a tiling window manager for the browser, backed by the grits
    content-addressed filesystem. Hosts a master pane (left, full-height)
    and a stack of widgets (right, proportionally sized), plus an icon strip
    for launching and restoring widgets. Layout is driven by a small state
    machine; widgets are independently loaded ES modules.

  @interface widget
    Widgets are ES modules with a default export:

      createWidget(opts) → { el, focus(), destroy() }

    opts:
      name        {string}   Display name for the title bar
      evalContext {object}   Namespace injected into interactive widgets.
                             Contains: { fs, sh, ui } — all initially null
                             stubs until wired to a real grits backend.

    Return value:
      el          {HTMLElement}  Root node. Will be mounted inside
                                 .widget-body. Must fill its container
                                 (width:100%, height:100% or flex:1).
      focus()                    Called when the widget's pane becomes
                                 active (e.g. on click or keyboard nav).
      destroy()                  Called on close. Must remove any global
                                 event listeners the widget registered.

    Styles:
      Use only CSS variables defined here (--bg, --bg2, --bg3, --border,
      --border-hi, --accent, --accent-dim, --text, --text-dim, --text-hi,
      --danger). Define no global class names; scope all styles to the
      element returned as `el`.
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gimbal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0e0f11;
    --bg2:         #13151a;
    --bg3:         #1a1d24;
    --border:      #2a2d36;
    --border-hi:   #3d4150;
    --accent:      #5b8dd9;
    --accent-dim:  #3a5a8a;
    --text:        #c8cdd8;
    --text-dim:    #6b7080;
    --text-hi:     #e8ecf4;
    --danger:      #c45a5a;
    --strip-w:     52px;
    --title-h:     28px;
    --divider-w:   5px;
    --divider-h:   5px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    overflow: hidden;
    user-select: none;
  }

  /* ── SCROLLBARS ──────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  ::-webkit-scrollbar-corner { background: transparent; }
  * { scrollbar-width: thin; scrollbar-color: var(--border-hi) transparent; }
  #minimized-section { scrollbar-width: none; }
  #minimized-section::-webkit-scrollbar { width: 0; }

  /* ── ROOT LAYOUT ─────────────────────────────────── */
  #root { display: flex; width: 100%; height: 100%; }

  /* ── WORKSPACE ───────────────────────────────────── */
  #workspace { flex: 1 1 0; display: flex; min-width: 0; position: relative; }

  /* ── MASTER PANE ─────────────────────────────────── */
  #master { flex: 0 0 auto; position: relative; display: flex; flex-direction: column; }

  /* ── MASTER/STACK DIVIDER ────────────────────────── */
  #ms-divider {
    width: var(--divider-w);
    background: var(--border);
    cursor: col-resize;
    flex: 0 0 var(--divider-w);
    position: relative;
    transition: background 0.15s;
    z-index: 10;
  }
  #ms-divider:hover, #ms-divider.dragging { background: var(--accent-dim); }
  #ms-divider::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1px; height: 32px;
    background: var(--border-hi);
    border-radius: 1px;
  }

  /* ── STACK PANE ──────────────────────────────────── */
  #stack { flex: 1 1 0; display: flex; flex-direction: column; min-width: 0; position: relative; }

  /* ── ICON STRIP ──────────────────────────────────── */
  #strip {
    width: var(--strip-w);
    flex: 0 0 var(--strip-w);
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    gap: 4px;
    position: relative;
    z-index: 20;
  }

  .strip-launcher {
    width: 36px; height: 36px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    position: relative;
  }
  .strip-launcher:hover { background: var(--bg3); border-color: var(--border); color: var(--text-hi); }
  .strip-launcher:active { background: var(--border); }
  .strip-launcher svg { width: 18px; height: 18px; }
  .strip-launcher .tip {
    display: none;
    position: absolute;
    right: calc(100% + 8px);
    top: 50%; transform: translateY(-50%);
    background: var(--bg3);
    border: 1px solid var(--border-hi);
    color: var(--text-hi);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 100;
  }
  .strip-launcher:hover .tip { display: block; }

  #strip-divider-line { width: 28px; height: 1px; background: var(--border); margin: 4px 0; flex-shrink: 0; }

  #minimized-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    overflow-y: auto;
    overflow-x: hidden;
    padding-bottom: 8px;
  }

  .min-thumb {
    width: 36px; height: 36px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
    position: relative;
  }
  .min-thumb:hover { border-color: var(--accent-dim); color: var(--text-hi); background: var(--bg); }
  .min-thumb svg { width: 16px; height: 16px; }
  .min-thumb .tip {
    display: none;
    position: absolute;
    right: calc(100% + 8px);
    top: 50%; transform: translateY(-50%);
    background: var(--bg3);
    border: 1px solid var(--border-hi);
    color: var(--text-hi);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 100;
  }
  .min-thumb:hover .tip { display: block; }

  /* ── WIDGET CHROME ───────────────────────────────── */
  .widget {
    display: flex;
    flex-direction: column;
    background: var(--bg2);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    min-height: 0;
  }
  .widget.in-master { flex: 1; border: none; }
  .widget.in-stack  { /* height via flexRatio */ }

  .widget-title {
    height: var(--title-h);
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 6px 0 10px;
    gap: 6px;
    flex-shrink: 0;
    cursor: grab;
  }
  .widget-title:active { cursor: grabbing; }

  .widget-name {
    flex: 1;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .widget-btn {
    width: 20px; height: 20px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    transition: background 0.1s, color 0.1s;
    flex-shrink: 0;
  }
  .widget-btn:hover { background: var(--border); color: var(--text-hi); }
  .widget-btn.danger:hover { background: var(--danger); color: #fff; }
  .widget-btn svg { width: 12px; height: 12px; }

  .widget-body {
    flex: 1;
    overflow: auto;
    min-height: 0;
    padding: 12px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text);
  }

  /* ── STACK DIVIDERS ──────────────────────────────── */
  .stack-divider {
    height: var(--divider-h);
    background: var(--border);
    cursor: row-resize;
    flex: 0 0 var(--divider-h);
    position: relative;
    transition: background 0.15s;
    z-index: 5;
  }
  .stack-divider:hover, .stack-divider.dragging { background: var(--accent-dim); }
  .stack-divider::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    height: 1px; width: 32px;
    background: var(--border-hi);
    border-radius: 1px;
  }

  /* ── DRAG GHOST ──────────────────────────────────── */
  #drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    background: var(--bg3);
    border: 1px solid var(--accent-dim);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--accent);
    opacity: 0.85;
    display: none;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>

<div id="root">
  <div id="workspace">
    <div id="master"></div>
    <div id="ms-divider"></div>
    <div id="stack"></div>
  </div>
  <div id="strip">
    <div id="strip-divider-line"></div>
    <div id="minimized-section"></div>
  </div>
</div>
<div id="drag-ghost"></div>

<script type="module">

import GritsClient   from '../grits/GritsClient.js';
import { makeShell } from '../gimbal/gsh.js';

const _origin = window.location.origin;
const _vol    = 'client';
const _libUrl = `${_origin}/grits/v1/content/${_vol}/lib`;
const _gg     = new GritsClient();

const evalContext = { fs: _gg, sh: null, ui: null };

const _shell = makeShell({
  gg: _gg, serverUrl: _origin, volume: _vol,
  cwd: '', libUrls: [_libUrl], evalContext,
});
evalContext.sh = _shell;

// ─────────────────────────────────────────────────────────
// CELL REGISTRY
// Each entry maps a launcher id to a dynamic import path and
// metadata. The module is loaded once on first use and cached.
// ─────────────────────────────────────────────────────────
const CELL_REGISTRY = {
  terminal: {
    name: 'Terminal', icon: 'terminal', defaultZone: 'stack',
    module: `${_libUrl}/gterm/gwm-widget.js`, _cache: null,
  },
  files: {
    name: 'File Browser', icon: 'files', defaultZone: 'master',
    module: `${_libUrl}/files/gwm-widget.js`, _cache: null,
  },
};

async function loadCell(id) {
  const entry = CELL_REGISTRY[id];
  if (!entry) throw new Error(`Unknown cell: ${id}`);
  if (!entry._cache) {
    const mod = await import(entry.module);
    entry._cache = mod.default;
  }
  return entry._cache;
}

// ─────────────────────────────────────────────────────────
// SVG ICONS
// ─────────────────────────────────────────────────────────
const ICONS = {
  terminal: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>`,
  files:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
  minimize: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  maximize: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>`,
  promote:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>`,
  demote:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="21" y2="3"/><line x1="3" y1="21" x2="14" y2="10"/></svg>`,
  close:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
};

// ─────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────
let widgetSeq  = 0;
let masterFrac = 0.62;
const widgets  = new Map(); // id → widget record

evalContext.ui = {
  openWidget({ el, focus, destroy, name = 'widget', icon = 'terminal', zone = 'stack' }) {
    const id = ++widgetSeq;
    const record = {
      id, name, icon, zone,
      masterHistory: zone === 'master' ? Date.now() : 0,
      stackOrder:    zone === 'stack'  ? stackMaxOrder() + 1 : 0,
      flexRatio: 1,
      cellEl:       el,
      cellInstance: { focus, destroy },
    };
    widgets.set(id, record);
    render();
    return id;
  }
};

// ─────────────────────────────────────────────────────────
// DOM HELPERS
// ─────────────────────────────────────────────────────────
const el  = (tag, cls) => { const e = document.createElement(tag); if (cls) e.className = cls; return e; };
const $   = id => document.getElementById(id);

function btn(iconName, label, danger, onClick) {
  const b = el('button', `widget-btn${danger ? ' danger' : ''}`);
  b.innerHTML = ICONS[iconName];
  b.title = label;
  b.addEventListener('click', e => { e.stopPropagation(); onClick(); });
  return b;
}

// ─────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────
function render() {
  const masterEl = $('master');
  const stackEl  = $('stack');
  const minEl    = $('minimized-section');
  const msd      = $('ms-divider');

  const masterW = [...widgets.values()].find(w => w.zone === 'master');
  const stackWs = [...widgets.values()].filter(w => w.zone === 'stack')
                    .sort((a,b) => a.stackOrder - b.stackOrder);
  const minWs   = [...widgets.values()].filter(w => w.zone === 'minimized');

  // master/stack divider visibility
  msd.style.display = (masterW && stackWs.length) ? '' : 'none';

  // master width
  if (masterW && stackWs.length) {
    masterEl.style.width = (masterFrac * 100) + '%';
  } else if (masterW) {
    masterEl.style.width = '100%';
  } else {
    masterEl.style.width = stackWs.length ? '0' : '100%';
  }

  // ── master ──
  masterEl.innerHTML = '';
  if (masterW) {
    masterEl.appendChild(buildWidgetEl(masterW, 'master'));
  } else {
    const emp = el('div');
    emp.style.cssText = 'flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:11px;opacity:0.35;';
    emp.textContent = 'no master window';
    masterEl.appendChild(emp);
  }

  // ── stack ──
  stackEl.innerHTML = '';
  if (stackWs.length) {
    const total = stackWs.reduce((s,w) => s + (w.flexRatio||1), 0);
    stackWs.forEach(w => w.flexRatio = (w.flexRatio||1) / total);
    stackWs.forEach((w, i) => {
      const wEl = buildWidgetEl(w, 'stack');
      wEl.style.flex = `${w.flexRatio} 1 0`;
      wEl.style.minHeight = '48px';
      stackEl.appendChild(wEl);
      if (i < stackWs.length - 1) {
        const div = el('div', 'stack-divider');
        div.dataset.above = w.id;
        div.dataset.below = stackWs[i+1].id;
        stackEl.appendChild(div);
        bindStackDivider(div);
      }
    });
  }

  // ── minimized ──
  minEl.innerHTML = '';
  minWs.forEach(w => {
    const thumb = el('div', 'min-thumb');
    thumb.innerHTML = ICONS[w.icon] + `<span class="tip">${w.name}</span>`;
    thumb.addEventListener('click', () => restoreWidget(w.id));
    minEl.appendChild(thumb);
  });
}

// ─────────────────────────────────────────────────────────
// WIDGET ELEMENT BUILDER
// ─────────────────────────────────────────────────────────
function buildWidgetEl(w, zone) {
  const wrap = el('div', `widget in-${zone}`);
  wrap.dataset.id = w.id;

  // title bar
  const title = el('div', 'widget-title');
  const nameEl = el('span', 'widget-name');
  nameEl.textContent = w.name;
  title.appendChild(nameEl);

  if (zone === 'stack') title.appendChild(btn('promote', 'send to master', false, () => promoteWidget(w.id)));
  if (zone === 'master' && [...widgets.values()].some(x => x.zone === 'stack'))
    title.appendChild(btn('demote', 'send to stack', false, () => demoteWidget(w.id)));
  title.appendChild(btn('maximize', 'maximize',  false, () => maximizeWidget(w.id)));
  title.appendChild(btn('minimize', 'minimize',  false, () => minimizeWidget(w.id)));
  title.appendChild(btn('close',    'close',     true,  () => closeWidget(w.id)));

  bindTitleDrag(title, w);
  wrap.appendChild(title);

  // body — mount the cell's el if available, else a loading placeholder
  const body = el('div', 'widget-body');
  body.style.padding = '0'; // cells manage their own padding
  if (w.cellEl) {
    body.appendChild(w.cellEl);
    // notify cell it is now in the DOM (cells that need dimensions at init)
    if (w.cellInstance?.mount) {
      requestAnimationFrame(() => w.cellInstance.mount());
    }
  } else {
    body.style.padding = '12px';
    body.style.color = 'var(--text-dim)';
    body.textContent = 'loading…';
  }
  wrap.appendChild(body);
  return wrap;
}

// ─────────────────────────────────────────────────────────
// WINDOW OPERATIONS
// ─────────────────────────────────────────────────────────
async function launchCell(cellId) {
  const entry = CELL_REGISTRY[cellId];
  if (!entry) return;

  const id  = ++widgetSeq;
  const now = Date.now();
  const zone = entry.defaultZone;

  // evict current master if opening as master
  if (zone === 'master') {
    const cur = [...widgets.values()].find(w => w.zone === 'master');
    if (cur) { cur.zone = 'stack'; cur.stackOrder = stackMaxOrder() + 1; }
  }

  // proportional stack sizing
  let newRatio = 1;
  if (zone === 'stack') {
    const existing = [...widgets.values()].filter(w => w.zone === 'stack');
    const n = existing.length;
    if (n > 0) {
      const total = existing.reduce((s,w) => s + (w.flexRatio||1), 0);
      existing.forEach(w => w.flexRatio = (w.flexRatio||1) * n / (n+1));
      newRatio = total / (n+1);
    }
  }

  const record = {
    id, name: entry.name, icon: entry.icon,
    zone, masterHistory: zone === 'master' ? now : 0,
    stackOrder: zone === 'stack' ? stackMaxOrder() + 1 : 0,
    flexRatio: newRatio,
    cellEl: null, cellInstance: null,
  };
  widgets.set(id, record);
  render(); // show loading state immediately

  // load cell module asynchronously
  try {
    const createWidget = await loadCell(cellId);
    const instance = await Promise.resolve(createWidget({ name: entry.name, evalContext }));
    record.cellEl       = instance.el;
    record.cellInstance = instance;
    render(); // re-render with real content
  } catch(e) {
    console.error(`Failed to load cell "${cellId}":`, e);
  }
}

function closeWidget(id) {
  const w = widgets.get(id);
  if (!w) return;
  w.cellInstance?.destroy();
  const wasMaster = w.zone === 'master';
  widgets.delete(id);
  if (wasMaster) electNewMaster();
  normalizeStackOrder();
  render();
}

function minimizeWidget(id) {
  const w = widgets.get(id);
  if (!w) return;
  const wasMaster = w.zone === 'master';
  w.zone = 'minimized';
  if (wasMaster) electNewMaster();
  normalizeStackOrder();
  render();
}

function maximizeWidget(id) {
  widgets.forEach((w, wid) => {
    if (wid !== id && (w.zone === 'master' || w.zone === 'stack')) w.zone = 'minimized';
  });
  const w = widgets.get(id);
  w.zone = 'master'; w.masterHistory = Date.now();
  normalizeStackOrder(); render();
}

function promoteWidget(id) {
  const w = widgets.get(id);
  if (!w) return;
  const cur = [...widgets.values()].find(x => x.zone === 'master');
  if (cur) { cur.zone = 'stack'; cur.stackOrder = stackMaxOrder() + 1; }
  w.zone = 'master'; w.masterHistory = Date.now();
  normalizeStackOrder(); render();
}

function demoteWidget(id) {
  const w = widgets.get(id);
  if (!w) return;
  w.zone = 'stack'; w.stackOrder = stackMaxOrder() + 1;
  electNewMaster(); normalizeStackOrder(); render();
}

function restoreWidget(id) {
  const w = widgets.get(id);
  if (!w) return;
  const masterOccupied = [...widgets.values()].some(x => x.zone === 'master');
  if (!masterOccupied && w.masterHistory > 0) {
    w.zone = 'master'; w.masterHistory = Date.now();
  } else {
    w.zone = 'stack'; w.stackOrder = stackMaxOrder() + 1;
  }
  normalizeStackOrder(); render();
}

function electNewMaster() {
  const best = [...widgets.values()]
    .filter(w => w.zone === 'stack' && w.masterHistory > 0)
    .sort((a,b) => b.masterHistory - a.masterHistory)[0];
  if (best) { best.zone = 'master'; best.masterHistory = Date.now(); }
}

function stackMaxOrder() {
  const orders = [...widgets.values()].filter(w => w.zone === 'stack').map(w => w.stackOrder);
  return orders.length ? Math.max(...orders) : 0;
}

function normalizeStackOrder() {
  [...widgets.values()].filter(w => w.zone === 'stack')
    .sort((a,b) => a.stackOrder - b.stackOrder)
    .forEach((w,i) => w.stackOrder = i);
}

// ─────────────────────────────────────────────────────────
// DIVIDER DRAG — master/stack
// ─────────────────────────────────────────────────────────
(function() {
  const div = $('ms-divider');
  let dragging = false, startX, startFrac;
  div.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; startFrac = masterFrac;
    div.classList.add('dragging'); e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const ws = $('workspace').getBoundingClientRect();
    const dx = e.clientX - startX;
    masterFrac = Math.max(0.15, Math.min(0.85, startFrac + dx / (ws.width - 5)));
    $('master').style.width = (masterFrac * 100) + '%';
  });
  document.addEventListener('mouseup', () => { dragging = false; div.classList.remove('dragging'); });
})();

// ─────────────────────────────────────────────────────────
// DIVIDER DRAG — stack internal
// ─────────────────────────────────────────────────────────
function bindStackDivider(divEl) {
  let dragging = false, startY, aboveW, belowW;
  divEl.addEventListener('mousedown', e => {
    dragging = true; startY = e.clientY;
    aboveW = widgets.get(parseInt(divEl.dataset.above));
    belowW = widgets.get(parseInt(divEl.dataset.below));
    divEl.classList.add('dragging'); e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = $('stack').getBoundingClientRect();
    const total = [...widgets.values()].filter(w => w.zone === 'stack')
                    .reduce((s,w) => s + w.flexRatio, 0);
    const delta = (e.clientY - startY) / rect.height * total;
    aboveW.flexRatio = Math.max(0.05, aboveW.flexRatio + delta);
    belowW.flexRatio = Math.max(0.05, belowW.flexRatio - delta);
    startY = e.clientY;
    render();
  });
  document.addEventListener('mouseup', () => { dragging = false; divEl.classList.remove('dragging'); });
}

// ─────────────────────────────────────────────────────────
// TITLE BAR DRAG — move between zones
// ─────────────────────────────────────────────────────────
function bindTitleDrag(titleEl, w) {
  let dragging = false;
  const ghost = $('drag-ghost');

  titleEl.addEventListener('mousedown', e => {
    if (e.target.closest('.widget-btn')) return;
    dragging = true;
    ghost.textContent = `↳ ${w.name}`;
    ghost.style.display = 'block';
    moveGhost(e); e.preventDefault();
  });
  document.addEventListener('mousemove', e => { if (dragging) moveGhost(e); });
  document.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false; ghost.style.display = 'none';
    const mr = $('master').getBoundingClientRect();
    const sr = $('stack').getBoundingClientRect();
    const inM = e.clientX >= mr.left && e.clientX <= mr.right && e.clientY >= mr.top && e.clientY <= mr.bottom;
    const inS = e.clientX >= sr.left && e.clientX <= sr.right && e.clientY >= sr.top && e.clientY <= sr.bottom;
    if (inM && w.zone !== 'master') promoteWidget(w.id);
    else if (inS && w.zone !== 'stack') demoteWidget(w.id);
  });
  function moveGhost(e) {
    ghost.style.left = (e.clientX + 14) + 'px';
    ghost.style.top  = (e.clientY + 10) + 'px';
  }
}

// ─────────────────────────────────────────────────────────
// STRIP LAUNCHERS
// ─────────────────────────────────────────────────────────
function buildStrip() {
  const strip   = $('strip');
  const divLine = $('strip-divider-line');
  Object.entries(CELL_REGISTRY).forEach(([id, entry]) => {
    const b = el('div', 'strip-launcher');
    b.innerHTML = ICONS[entry.icon] + `<span class="tip">${entry.name}</span>`;
    b.addEventListener('click', () => launchCell(id));
    strip.insertBefore(b, divLine);
  });
}

// ─────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────
buildStrip();
launchCell('files');
launchCell('terminal');
</script>

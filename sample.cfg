{
  "storageSize": 0,
  "storageFreeSize": 0,
  "runAsUser": "%USER%",
  "modules": [
    {
      "type": "volume",
      "volumeName": "root"
    },
    {
      "type": "mount",
      "volume": "root",
      "mountPoint": "./content"
    },
    {
      "type": "http",
      "thisHost": "%HOSTNAME%",
      "thisPort": 443,
      "enableTls": true,
      "readOnly": true,
      "autoCertificate": true,
      "certbotEmail": "%EMAIL%"
    },
    {
      "type": "deploy",
      "hostName": "%HOSTNAME%",
      "urlPath": "/",
      "volume": "root",
      "volumePath": "public"
    },
    {
      "type": "serviceworker"
    }
  ]
}
